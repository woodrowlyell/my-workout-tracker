  celebratedCycles: []
};

function todayStr() { return new Date().toISOString().split('T')[0]; }

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 1400);
}

async function saveState() {
  try {
    localStorage.setItem('workout-state-v3', JSON.stringify(state));
    toast('Saved');
  } catch (e) {
    toast('Save failed, try again');
  }
}

function migrateToPerDayKeys() {
  if (state.migratedToPerDay) return;
  if (!state.activePlan) return;
  const oldKeyPattern = /^([a-zA-Z0-9_]+)::c(\d+)::w(\d+)$/;
  const newWeights = {};
  let migratedCount = 0;
  Object.keys(state.weights).forEach(function(oldKey) {
    const alreadyNewFormat = oldKey.split('::').length === 4;
    if (alreadyNewFormat) {
      newWeights[oldKey] = state.weights[oldKey];
      return;
    }
    const match = oldKey.match(oldKeyPattern);
    if (!match) {
      newWeights[oldKey] = state.weights[oldKey];
      return;
    }
    const exId = match[1];
    const cycle = match[2];
    const week = match[3];
    let ownerDay = null;
    Object.keys(state.activePlan).forEach(function(dayKey) {
      const day = state.activePlan[dayKey];
      if (day.rest) return;
      if (day.exerciseIds && day.exerciseIds.indexOf(exId) !== -1) {
        if (!ownerDay) ownerDay = dayKey;
      }
    });
    if (ownerDay) {
      const newKey = ownerDay + '::' + exId + '::c' + cycle + '::w' + week;
      newWeights[newKey] = state.weights[oldKey];
      migratedCount++;
    } else {
      newWeights[oldKey] = state.weights[oldKey];
    }
  });
  state.weights = newWeights;
  state.migratedToPerDay = true;
  saveState();
  if (migratedCount > 0) {
    toast('Data updated: ' + migratedCount + ' entries migrated');
  }
}

async function loadState() {
  try {
    const raw = localStorage.getItem('workout-state-v3');
    if (raw) {
      state = Object.assign({}, state, JSON.parse(raw));
      migrateToPerDayKeys();
    }
  } catch (e) {}
  if (!state.disclaimerAccepted) {
    render();
    return;
  }
  if (!state.goal || !state.activePlan) {
    state.screen = 'select_goal';
  }
  render();
}

function acceptDisclaimer() {
  state.disclaimerAccepted = true;
  state.disclaimerAcceptedDate = todayStr();
  saveState();
  if (!state.goal || !state.activePlan) {
    state.screen = 'select_goal';
  }
  render();
}

function chooseGoalTop(goalKey) {

  }

}

function chooseSubgoal(subgoalKey) {
  state.selectedSubgoal = subgoalKey;
  state.screen = 'select_length';
  saveState();
  render();
}

function chooseLength(len) {
  state.selectedLength = len;
  finalizeProgram(state.selectedGoal, state.selectedSubgoal);
}

function finalizeProgram(goalKey, subgoalKey) {
  if (!isProgramAvailable(state.selectedLength, goalKey, subgoalKey)) {
    toast('That combination is not ready yet');
    return;
  }
  const program = getProgram(state.selectedLength, goalKey, subgoalKey);
  state.goal = goalKey;
  state.selectedSubgoal = subgoalKey;
  state.activePlan = JSON.parse(JSON.stringify(program.days));
  state.programLength = state.selectedLength;
  state.screen = 'day';
  state.week = 1;
  saveState();
  render();
}

function getEntry(dayKey, exId, week, cycle) {
  const c = cycle !== undefined ? cycle : state.viewingCycle;
  const k = dayKey + '::' + exId + '::c' + c + '::w' + week;
  return state.weights[k] || null;
}
function setEntry(dayKey, exId, week, field, val) {
  const k = dayKey + '::' + exId + '::c' + state.viewingCycle + '::w' + week;
  if (!state.weights[k]) state.weights[k] = {};
  state.weights[k][field] = val;
  saveState();
}
function clearEntry(dayKey, exId, week) {
  const k = dayKey + '::' + exId + '::c' + state.viewingCycle + '::w' + week;
  delete state.weights[k];
  saveState();
}
function getPrevEntry(dayKey, exId, week) {
  for (let w = week - 1; w >= 1; w--) {
    const e = getEntry(dayKey, exId, w);
    if (e && (e.weight || e.done)) return { week: w, entry: e };
  }
  if (state.viewingCycle > 1) {
    for (let c = state.viewingCycle - 1; c >= 1; c--) {
      for (let w = 8; w >= 1; w--) {
        const e = getEntry(dayKey, exId, w, c);
        if (e && (e.weight || e.done)) return { week: w, entry: e, cycle: c };
      }
    }
  }
  return null;
}
function getLastKnownWeightAnyDay(exId, excludeDayKey, week, cycle) {
  const c = cycle !== undefined ? cycle : state.viewingCycle;
  let best = null;
  Object.keys(state.activePlan).forEach(function(dayKey) {
    const day = state.activePlan[dayKey];
    if (day.rest && exId !== '__steps__') return;
    if (exId !== '__steps__' && (!day.exerciseIds || day.exerciseIds.indexOf(exId) === -1)) return;
    for (let w = week; w >= 1; w--) {
      if (dayKey === excludeDayKey && w === week) continue;
      const e = getEntry(dayKey, exId, w, c);
      if (e && e.weight) {
        if (!best || w > best.week || (w === best.week && dayKey > best.dayKey)) {
          best = { week: w, entry: e, dayKey: dayKey };
        }
      }
    }
  });
  return best;
}
function getAllEntriesForExercise(exId) {
  const results = [];
  Object.keys(state.activePlan).forEach(function(dayKey) {
    for (let c = 1; c <= state.cycle; c++) {
      for (let w = 1; w <= (state.programLength || 8); w++) {
        const e = getEntry(dayKey, exId, w, c);
        if (e && e.weight) results.push({ week: w, cycle: c, dayKey: dayKey, weight: parseFloat(e.weight), date: e.date });
      }
    }
  });
  return results;
}

function isDayComplete(dayKey, week) {
  const day = state.activePlan[dayKey];
  if (!day) return false;
  if (day.rest) {
    const e = getEntry(dayKey, '__rest_' + dayKey + '__', week);
    const restDone = !!(e && e.done);
    if (day.stepsGoal) {
      const stepsE = getEntry(dayKey, '__steps__', week);
      return restDone && !!(stepsE && stepsE.weight);
    }
    return restDone;
  }
  const mob = getEntry(dayKey, '__mobility_' + dayKey + '__', week);
  if (!mob || !mob.done) return false;
  const cardio = getEntry(dayKey, '__cardio_' + dayKey + '__', week);
  if (!cardio || !cardio.done) return false;
  for (let i = 0; i < day.exerciseIds.length; i++) {
    const exId = day.exerciseIds[i];
    const ex = exerciseLibrary[exId];
    const e = getEntry(dayKey, exId, week);
    if (ex.noWeight) {
      if (!e || !e.done) return false;
    } else {
      if (!e || !e.weight) return false;
    }
  }
  if (day.finisherId) {
    const fin = getEntry(dayKey, '__finisher_' + dayKey + '__', week);
    if (!fin || !fin.done) return false;
  }
  return true;
}

function isWeekComplete(week) {
  const keys = Object.keys(state.activePlan);
  for (let i = 0; i < keys.length; i++) {
    if (!isDayComplete(keys[i], week)) return false;
  }
  return true;
}

    };
    btns.appendChild(permBtn);

  const closeBtn = document.createElement('button');

  document.body.appendChild(overlay);
}

function checkAndCelebrate(dayKey, week) {
  const dayCelebrationKey = 'c' + state.cycle + '-w' + week + '-' + dayKey;
  if (isDayComplete(dayKey, week) && state.celebratedDays.indexOf(dayCelebrationKey) === -1) {
    state.celebratedDays.push(dayCelebrationKey);
    saveState();
    setTimeout(function() { showEncouragementModal('day'); }, 350);
    return;
  }
  const weekCelebrationKey = 'c' + state.cycle + '-w' + week;
  if (isWeekComplete(week) && state.celebratedWeeks.indexOf(weekCelebrationKey) === -1) {
    state.celebratedWeeks.push(weekCelebrationKey);
    saveState();
    setTimeout(function() { showEncouragementModal('week'); }, 350);
    return;
  }
  const totalWeeks = state.programLength || 8;
  let allWeeksDone = true;
  for (let w = 1; w <= totalWeeks; w++) {
    if (!isWeekComplete(w)) { allWeeksDone = false; break; }
  }
  const cycleCelebrationKey = 'c' + state.cycle;
  if (allWeeksDone && state.celebratedCycles.indexOf(cycleCelebrationKey) === -1) {
    state.celebratedCycles.push(cycleCelebrationKey);
    saveState();
    setTimeout(function() { showEncouragementModal('cycle'); }, 350);
  }
}

      setEntry(dayKey, blockKey, state.week, 'done', true);
      setEntry(dayKey, blockKey, state.week, 'date', todayStr());
    } else {
      clearEntry(dayKey, blockKey, state.week);
    }
    render();
  });
  wrap.appendChild(row);
  if (entry.done) wrap.classList.add('ex-complete');
  return wrap;
}

function renderStepsBlock(dayKey, stepsGoalText) {
  const wrap = document.createElement('div');
  wrap.className = 'card';
  const entry = getEntry(dayKey, '__steps__', state.week) || {};
  const label = stepsGoalText ? ('Steps (goal: ' + stepsGoalText + ')') : 'Steps';
  wrap.innerHTML = '<p class="ex-name">' + label + '</p>';
  const row = document.createElement('div');
  row.className = 'weight-row';
  row.innerHTML = '<label>Today</label><input type="number" inputmode="numeric" placeholder="0" value="' + (entry.weight || '') + '" /><span class="unit">steps</span>';
  const input = row.querySelector('input');
  input.addEventListener('change', function() {
    if (input.value) {
      setEntry(dayKey, '__steps__', state.week, 'weight', input.value);
      setEntry(dayKey, '__steps__', state.week, 'date', todayStr());
    } else {
      clearEntry(dayKey, '__steps__', state.week);
    }
    render();
  });
  wrap.appendChild(row);
  if (entry.date) {
    const dn = document.createElement('div');
    dn.className = 'prev-weight';
    dn.textContent = 'Logged: ' + entry.date;
    wrap.appendChild(dn);
  }
  const lastElsewhere = getLastKnownWeightAnyDay('__steps__', dayKey, state.week);
  if (lastElsewhere && !entry.weight) {
    const ref = document.createElement('div');
    ref.className = 'prev-weight';
    ref.style.cssText = 'font-style:italic;color:#a15a1c;';
    const otherDayLabel = state.activePlan[lastElsewhere.dayKey] ? state.activePlan[lastElsewhere.dayKey].label : lastElsewhere.dayKey;
    ref.textContent = lastElsewhere.entry.weight + ' steps logged ' + (lastElsewhere.entry.date || '') + ' (' + otherDayLabel + ', reference only)';
    wrap.appendChild(ref);
  }
  if (entry.weight) wrap.classList.add('ex-complete');
  return wrap;
}

    content.appendChild(banner);
    if (day.stepsGoal) {
      content.appendChild(renderStepsBlock(state.day, day.stepsGoal));

    content.appendChild(renderTrackedBlock(state.day, '__rest_' + state.day + '__', 'Completed this day', false));

    return;
  }
  if (isDayComplete(state.day, state.week)) {
    const db = document.createElement('div');
    db.className = 'day-complete-banner';

    checkAndCelebrate(state.day, state.week);
    if (!state.shownDayTip) {
      state.shownDayTip = true;
      saveState();
      setTimeout(function() { showTipModal('day'); }, 1400);
    } else if (!state.shownWeekTip && isWeekComplete(state.week)) {
      state.shownWeekTip = true;
      saveState();
      setTimeout(function() { showTipModal('week'); }, 1400);
    }
  }
  const mobLabel = document.createElement('div');
  mobLabel.className = 'section-label';
  mobLabel.textContent = 'Mobility warm-up';
  content.appendChild(mobLabel);
  content.appendChild(renderTrackedBlock(state.day, '__mobility_' + state.day + '__', 'Completed mobility warm-up', true));
  const cardioLabel = document.createElement('div');
  cardioLabel.className = 'section-label';
  cardioLabel.textContent = 'Cardio warm-up';
  content.appendChild(cardioLabel);
  const wu = exerciseLibrary[day.warmupId];
  const wuCard = document.createElement('div');
  wuCard.className = 'simple-item';
  wuCard.textContent = wu.name + ' - ' + wu.scheme;
  content.appendChild(wuCard);
  content.appendChild(renderTrackedBlock(state.day, '__cardio_' + state.day + '__', 'Completed cardio warm-up', false));
  const exLabel = document.createElement('div');
  exLabel.className = 'section-label';
  exLabel.textContent = 'Exercises';
  content.appendChild(exLabel);

    finCard.textContent = fin.name + ' - ' + fin.scheme;

function renderCheckpointField(cpKey, fieldKey, label, placeholder) {
  const row = document.createElement('div');
  row.className = 'cp-row';
  const val = (state.checkpoints[cpKey] && state.checkpoints[cpKey][fieldKey]) || '';
  row.innerHTML = '<label>' + label + '</label><input type="text" inputmode="decimal" placeholder="' + placeholder + '" value="' + val + '" />';
  const input = row.querySelector('input');
  input.addEventListener('change', function() {
    if (!state.checkpoints[cpKey]) state.checkpoints[cpKey] = {};
    state.checkpoints[cpKey][fieldKey] = input.value;
    saveState();
  });
  return row;
}

function buildLineChart(title, points, color) {
  const wrap = document.createElement('div');
  wrap.className = 'progress-ex-card';
  if (title) {
    const h = document.createElement('h4');
    h.textContent = title;
    wrap.appendChild(h);
  }
  const valid = points.filter(function(p) { return p.val !== null && !isNaN(p.val); });
  if (valid.length < 2) {
    const nd = document.createElement('div');
    nd.className = 'no-data';
    nd.textContent = valid.length === 0 ? 'No data entered yet' : 'Need at least 2 data points to graph';
    wrap.appendChild(nd);
    return wrap;
  }
  const W = 320, H = 140, pad = 30;
  const vals = valid.map(function(p) { return p.val; });
  const min = Math.min.apply(null, vals), max = Math.max.apply(null, vals);
  const range = max - min || 1;
  const stepX = (W - pad * 2) / (points.length - 1);
  let pathD = '', dots = '', labels = '';
  points.forEach(function(p, i) {
    if (p.val === null || isNaN(p.val)) return;
    const x = pad + i * stepX;
    const y = H - pad - ((p.val - min) / range) * (H - pad * 2);
    pathD += (pathD ? 'L' : 'M') + x + ',' + y + ' ';
    dots += '<circle cx="' + x + '" cy="' + y + '" r="4" fill="' + color + '"/>';
    labels += '<text x="' + x + '" y="' + (H - 6) + '" font-size="10" fill="#999" text-anchor="middle">' + p.label + '</text>';
    labels += '<text x="' + x + '" y="' + (y - 10) + '" font-size="11" fill="#333" text-anchor="middle" font-weight="600">' + p.val + '</text>';
  });
  wrap.innerHTML += '<svg class="chart" viewBox="0 0 ' + W + ' ' + H + '"><path d="' + pathD + '" fill="none" stroke="' + color + '" stroke-width="2.5"/>' + dots + labels + '</svg>';
  const first = valid[0].val, last = valid[valid.length - 1].val;
  const diff = (last - first).toFixed(1);
  const stats = document.createElement('div');
  stats.className = 'chart-stats';
  stats.innerHTML = '<div>Start: <strong>' + first + '</strong></div><div>Latest: <strong>' + last + '</strong></div><div>Change: <strong>' + (diff > 0 ? '+' : '') + diff + '</strong></div>';
  wrap.appendChild(stats);
  return wrap;
}

function deleteCheckpoint(cpKey) {
  const step1 = confirm('Remove this checkpoint entry? This cannot be undone.');
  if (!step1) return;
  const step2 = confirm('Are you sure? This will permanently delete this checkpoint data.');
  if (!step2) return;
  state.checkpoints[cpKey] = {};
  saveState();
  render();
  toast('Checkpoint removed');
}

function renderCheckpointsScreen(container) {
  const content = document.createElement('div');
  content.className = 'content';
  const intro = document.createElement('div');
  intro.className = 'banner';
  intro.innerHTML = '<strong>Monthly checkpoints - Cycle ' + state.cycle + ':</strong> log your numbers at start, week 4, and week 8. Take photos on your phone and keep them in your own Photos app.';
  content.appendChild(intro);
  const defs = [{ key: 'start', title: 'Start' }, { key: 'week4', title: 'Week 4' }, { key: 'week8', title: 'Week 8' }];
  defs.forEach(function(def) {
    const card = document.createElement('div');
    card.className = 'checkpoint-card';
    const h = document.createElement('h3');
    const hasData = state.checkpoints[def.key] && (state.checkpoints[def.key].weight || state.checkpoints[def.key].waist);
    h.innerHTML = '<span>' + def.title + '</span>';
    if (hasData) {
      const delBtn = document.createElement('button');
      delBtn.className = 'cp-delete-btn';
      delBtn.textContent = 'Remove';
      delBtn.onclick = function() { deleteCheckpoint(def.key); };
      h.appendChild(delBtn);
    }
    card.appendChild(h);
    card.appendChild(renderCheckpointField(def.key, 'weight', 'Weight', 'lbs'));
    card.appendChild(renderCheckpointField(def.key, 'waist', 'Waist', 'inches'));
    content.appendChild(card);
  });
  const measLabel = document.createElement('div');
  measLabel.className = 'section-label';
  measLabel.textContent = 'Measurement trend (all cycles)';
  content.appendChild(measLabel);
  let allPoints = [];
  (state.archivedCheckpoints || []).forEach(function(arch) {
    defs.forEach(function(def) {
      allPoints.push({ label: 'C' + arch.cycle + ' ' + def.title, weight: parseFloat(arch[def.key] && arch[def.key].weight) || null, waist: parseFloat(arch[def.key] && arch[def.key].waist) || null });
    });
  });
  defs.forEach(function(def) {
    allPoints.push({ label: (state.cycle > 1 ? ('C' + state.cycle + ' ') : '') + def.title, weight: parseFloat(state.checkpoints[def.key] && state.checkpoints[def.key].weight) || null, waist: parseFloat(state.checkpoints[def.key] && state.checkpoints[def.key].waist) || null });
  });
  content.appendChild(buildLineChart('Weight (lbs)', allPoints.map(function(p) { return { label: p.label, val: p.weight }; }), '#e8722c'));
  content.appendChild(buildLineChart('Waist (in)', allPoints.map(function(p) { return { label: p.label, val: p.waist }; }), '#3a7ae8'));
  container.appendChild(content);
}

function renderProgressScreen(container) {
  const content = document.createElement('div');
  content.className = 'content';
  const intro = document.createElement('div');
  intro.className = 'banner';
  intro.innerHTML = '<strong>Exercise progress - Cycle ' + state.cycle + ':</strong> every exercise you have logged, tracked across weeks and past cycles, even if swapped out of your current plan.';
  content.appendChild(intro);
  const restartWrap = document.createElement('div');
  restartWrap.className = 'card';
  restartWrap.innerHTML = '<p class="ex-name" style="margin-bottom:6px;">Finished this cycle?</p><p class="ex-scheme" style="margin-bottom:10px;">Choose a new program length and goal. All past data stays saved for these graphs.</p>';
  const restartBtn = document.createElement('button');
  restartBtn.textContent = 'Start New Cycle';
  restartBtn.style.cssText = 'width:100%;padding:12px;background:#1c1c1a;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;';
  restartBtn.onclick = function() {
    if (confirm('Start a new cycle? Your current cycle data stays saved for progress tracking, and you will choose a new program length and goal.')) {
      const hasData = state.checkpoints && ((state.checkpoints.start && state.checkpoints.start.weight) || (state.checkpoints.week4 && state.checkpoints.week4.weight) || (state.checkpoints.week8 && state.checkpoints.week8.weight));
      if (hasData) {
        state.archivedCheckpoints.push({ cycle: state.cycle, start: state.checkpoints.start, week4: state.checkpoints.week4, week8: state.checkpoints.week8 });
      }
      state.goalHistory.push({ cycle: state.cycle, goal: state.goal, length: state.programLength });
      state.checkpoints = { start: {}, week4: {}, week8: {} };
      state.cycle += 1;
      state.viewingCycle = state.cycle;
      state.week = 1;
      state.screen = 'select_goal';
      saveState();
      render();
    }
  };
  restartWrap.appendChild(restartBtn);
  content.appendChild(restartWrap);
  const stepsEntries = [];
  Object.keys(state.activePlan).forEach(function(dayKey) {
    for (let c = 1; c <= state.cycle; c++) {
      for (let w = 1; w <= (state.programLength || 8); w++) {
        const e = getEntry(dayKey, '__steps__', w, c);
        if (e && e.weight) stepsEntries.push({ week: w, cycle: c, dayKey: dayKey, weight: parseFloat(e.weight) });
      }
    }
  });
  if (stepsEntries.length >= 2) {
    stepsEntries.sort(function(a, b) { return (a.cycle - b.cycle) || (a.week - b.week); });
    const stepPoints = stepsEntries.map(function(e) {
      const dayLabel = state.activePlan[e.dayKey] ? state.activePlan[e.dayKey].label.split(' ')[0] : e.dayKey;
      return { label: (state.cycle > 1 ? ('C' + e.cycle + 'W' + e.week) : ('Wk' + e.week)) + ' ' + dayLabel, val: e.weight };
    });
    content.appendChild(buildLineChart('Daily Steps', stepPoints, '#3a7ae8'));
  }
  const seen = {};
  Object.keys(exerciseLibrary).forEach(function(exId) {
    const entries = getAllEntriesForExercise(exId);
    if (entries.length === 0) return;
    seen[exId] = true;
    const card = document.createElement('div');
    card.className = 'progress-ex-card';
    const h = document.createElement('h4');
    h.textContent = exerciseLibrary[exId].name;
    card.appendChild(h);
    if (entries.length < 2) {
      const nd = document.createElement('div');
      nd.className = 'no-data';
      nd.textContent = '1 entry logged (Week ' + entries[0].week + ': ' + entries[0].weight + ' lbs) - need 2+ to graph';
      card.appendChild(nd);
      content.appendChild(card);
      return;
    }
    entries.sort(function(a, b) { return (a.cycle - b.cycle) || (a.week - b.week); });
    const points = entries.map(function(e) {
      const dayLabel = state.activePlan[e.dayKey] ? state.activePlan[e.dayKey].label.split(' ')[0] : e.dayKey;
      return { label: (state.cycle > 1 ? ('C' + e.cycle + 'W' + e.week) : ('Wk' + e.week)) + ' ' + dayLabel, val: e.weight };
    });
    const chart = buildLineChart('', points, '#e8722c');
    card.innerHTML += chart.innerHTML;
    content.appendChild(card);
  });
  if (Object.keys(seen).length === 0) {
    const nd = document.createElement('div');
    nd.className = 'rest-note';
    nd.textContent = 'No weighted exercises logged yet.';
    content.appendChild(nd);
  }
  const legalLink = document.createElement('button');
  legalLink.textContent = 'View medical disclaimer';
  legalLink.style.cssText = 'width:100%;padding:10px;background:none;border:none;color:#999;font-size:12px;text-decoration:underline;margin-top:16px;';
  legalLink.onclick = function() {
    state.disclaimerAccepted = false;
    saveState();
    render();
  };
  content.appendChild(legalLink);
  renderTipLink(content);
  container.appendChild(content);
}

function renderDebugScreen(container) {
  const content = document.createElement('div');
  content.className = 'content';
  const intro = document.createElement('div');
  intro.className = 'banner';
  intro.innerHTML = '<strong>Storage check:</strong> everything saved on this phone right now.';
  content.appendChild(intro);
  const summaryCard = document.createElement('div');
  summaryCard.className = 'progress-ex-card';
  let summaryHtml = '<h4>Current app state</h4>';
  summaryHtml += '<div style="font-size:13px;padding:4px 0;">Current cycle: <strong>' + state.cycle + '</strong></div>';
  summaryHtml += '<div style="font-size:13px;padding:4px 0;">Current week: <strong>' + state.week + '</strong></div>';
  summaryHtml += '<div style="font-size:13px;padding:4px 0;">Goal: <strong>' + (state.goal || 'none set') + '</strong></div>';
  summaryHtml += '<div style="font-size:13px;padding:4px 0;">Program length: <strong>' + (state.programLength || 'none') + '</strong></div>';
  summaryHtml += '<div style="font-size:13px;padding:4px 0;">Total weight entries stored: <strong>' + Object.keys(state.weights).length + '</strong></div>';
  summaryCard.innerHTML = summaryHtml;
  content.appendChild(summaryCard);
  const entriesCard = document.createElement('div');
  entriesCard.className = 'progress-ex-card';
  let entriesHtml = '<h4>All logged weight entries</h4>';
  const keys = Object.keys(state.weights);
  if (keys.length === 0) {
    entriesHtml += '<p style="font-size:13px;">No entries found.</p>';
  } else {
    keys.sort().forEach(function(k) {
      const v = state.weights[k];
      entriesHtml += '<div style="font-size:11px;padding:3px 0;border-top:1px solid #f0efe9;">' + k + ' &rarr; ' + JSON.stringify(v) + '</div>';
    });
  }
  entriesCard.innerHTML = entriesHtml;
  content.appendChild(entriesCard);
  const allKeysCard = document.createElement('div');
  allKeysCard.className = 'progress-ex-card';
  let html = '<h4>All localStorage keys on this site</h4>';
  if (localStorage.length === 0) {
    html += '<p style="font-size:13px;">No keys found at all.</p>';
  } else {
    html += '<p style="font-size:13px;">Found ' + localStorage.length + ' key(s):</p>';
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      const v = localStorage.getItem(k);
      html += '<div style="font-size:12px;padding:4px 0;border-top:1px solid #f0efe9;"><strong>' + k + '</strong> (' + (v ? v.length : 0) + ' chars)</div>';
    }
  }
  allKeysCard.innerHTML = html;
  content.appendChild(allKeysCard);
  container.appendChild(content);
}

function renderDayTabs(container) {
  const dt = document.createElement('div');
  dt.className = 'day-tabs';
  const keys = Object.keys(state.activePlan);
  keys.forEach(function(key) {
    const b = document.createElement('button');
    b.className = 'day-tab' + (state.day === key && state.screen === 'day' ? ' active' : '');
    b.innerHTML = state.activePlan[key].label + (isDayComplete(key, state.week) ? '<span class="tab-check">&#10003;</span>' : '');
    b.onclick = function() { state.day = key; state.screen = 'day'; saveState(); render(); };
    dt.appendChild(b);
  });
  const cb = document.createElement('button');
  cb.className = 'day-tab' + (state.screen === 'checkpoints' ? ' active' : '');
  cb.textContent = 'Checkpoints';
  cb.onclick = function() { state.screen = 'checkpoints'; saveState(); render(); };
  dt.appendChild(cb);
  const pb = document.createElement('button');
  pb.className = 'day-tab' + (state.screen === 'progress' ? ' active' : '');
  pb.textContent = 'Progress';
  pb.onclick = function() { state.screen = 'progress'; saveState(); render(); };
  dt.appendChild(pb);
  const db = document.createElement('button');
  db.className = 'day-tab' + (state.screen === 'debug' ? ' active' : '');
  db.textContent = 'Storage';
  db.onclick = function() { state.screen = 'debug'; saveState(); render(); };
  dt.appendChild(db);
  container.appendChild(dt);
}

function renderWeekPicker(container) {
  const header = document.createElement('div');
  header.className = 'header';
  const cycleOptions = [];
  for (let c = 1; c <= state.cycle; c++) cycleOptions.push(c);
  let cycleSelectHtml = '';
  if (cycleOptions.length > 1) {
    cycleSelectHtml = '<select id="cycle-select" style="margin-top:8px;padding:6px 10px;border-radius:8px;border:1px solid #444;background:#2a2a27;color:#d5d4cd;font-size:13px;">' +
      cycleOptions.map(function(c) { return '<option value="' + c + '"' + (c === state.viewingCycle ? ' selected' : '') + '>Cycle ' + c + (c === state.cycle ? ' (current)' : '') + '</option>'; }).join('') +
      '</select>';
  }
  header.innerHTML = '<h1>' + goalTemplates[state.goal].label + '</h1><div class="sub" id="week-sub"></div>' + cycleSelectHtml + '<div class="week-picker" id="week-picker"></div>';
  container.appendChild(header);
  if (cycleOptions.length > 1) {
    const sel = header.querySelector('#cycle-select');
    sel.onchange = function() {
      state.viewingCycle = parseInt(sel.value, 10);
      state.week = 1;
      saveState();
      render();
    };
  }
  const wp = header.querySelector('#week-picker');
  const totalWeeks = state.programLength || 8;
  for (let i = 1; i <= totalWeeks; i++) {
    const b = document.createElement('button');
    b.className = 'week-btn' + (state.week === i ? ' active' : '');
    b.innerHTML = 'Wk ' + i + (isWeekComplete(i) ? '<span class="tab-check">&#10003;</span>' : '');
    b.onclick = (function(i) { return function() { state.week = i; saveState(); render(); }; })(i);
    wp.appendChild(b);
  }
  const viewingLabel = state.viewingCycle !== state.cycle ? ' - viewing past cycle' : '';
  header.querySelector('#week-sub').textContent = 'Cycle ' + state.viewingCycle + ' - Week ' + state.week + ' of ' + totalWeeks + viewingLabel;
  if (state.viewingCycle !== state.cycle) {
    const backBtn = document.createElement('button');
    backBtn.textContent = 'Return to current cycle';
    backBtn.style.cssText = 'margin-top:8px;padding:8px 12px;background:#e8722c;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;';
    backBtn.onclick = function() {
      state.viewingCycle = state.cycle;
      state.week = 1;
      saveState();
      render();
    };
    header.appendChild(backBtn);
  }
}

function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';
  if (!state.disclaimerAccepted) {
    renderDisclaimer();
    return;
  }
  if (state.screen === 'select_goal') {
    renderGoalSelect();
    return;
  }
  if (state.screen === 'select_subgoal') {
    renderSubgoalSelect();
    return;
  }
  if (state.screen === 'select_length') {
    renderLengthSelect();
    return;
  }
  renderDayTabs(app);
  renderWeekPicker(app);
  if (state.screen === 'checkpoints') {
    renderCheckpointsScreen(app);
  } else if (state.screen === 'progress') {
    renderProgressScreen(app);
  } else if (state.screen === 'debug') {
    renderDebugScreen(app);
  } else {
    renderDayContent(app);
  }
}

loadState();
</script>
