<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Strength Program</title>
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Workout Plan">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f4f3ef; color: #1c1c1a; padding-bottom: 80px; }
  .header { background: #1c1c1a; color: #fff; padding: 20px 16px 16px; position: sticky; top: 0; z-index: 10; }
  .header h1 { margin: 0 0 4px; font-size: 18px; font-weight: 600; }
  .header .sub { font-size: 12px; color: #b8b7b0; }
  .week-picker { display: flex; gap: 6px; margin-top: 12px; overflow-x: auto; padding-bottom: 4px; }
  .week-btn { flex-shrink: 0; padding: 6px 12px; border-radius: 20px; border: 1px solid #444; background: #2a2a27; color: #d5d4cd; font-size: 13px; white-space: nowrap; }
  .week-btn.active { background: #e8722c; border-color: #e8722c; color: #fff; font-weight: 600; }
  .day-tabs { display: flex; overflow-x: auto; gap: 6px; padding: 10px 16px; background: #fff; border-bottom: 1px solid #e2e0d8; position: sticky; top: 0; z-index: 9; }
  .day-tab { flex-shrink: 0; padding: 8px 14px; border-radius: 8px; border: 1px solid #ddd; background: #f7f6f2; font-size: 13px; font-weight: 600; color: #555; }
  .day-tab.active { background: #1c1c1a; color: #fff; border-color: #1c1c1a; }
  .content { padding: 14px; }
  .banner { background: #fdf0e6; border: 1px solid #f0cba4; border-radius: 10px; padding: 10px 12px; font-size: 13px; color: #7a4a1c; margin-bottom: 14px; line-height: 1.4; }
  .section-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: #999; font-weight: 700; margin: 18px 0 8px; }
  .section-label:first-child { margin-top: 0; }
  .card { background: #fff; border: 1px solid #e6e4dc; border-radius: 12px; padding: 12px 14px; margin-bottom: 10px; }
  .card.ex-complete, .simple-item.ex-complete { background: rgba(76, 175, 80, 0.14); border-color: rgba(76, 175, 80, 0.4); }
  .ex-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .ex-name { font-size: 15px; font-weight: 600; margin: 0 0 2px; }
  .ex-scheme { font-size: 13px; color: #777; margin: 0; }
  .ex-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .ex-btn { font-size: 11px; font-weight: 600; color: #e8722c; text-decoration: none; border: 1px solid #f0cba4; background: #fdf0e6; padding: 6px 8px; border-radius: 8px; white-space: nowrap; }
  .weight-row { display: flex; align-items: center; gap: 10px; margin-top: 10px; padding-top: 10px; border-top: 1px solid #f0efe9; }
  .weight-row label { font-size: 12px; color: #888; flex-shrink: 0; }
  .weight-row input[type=number] { flex: 1; min-width: 0; padding: 8px 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; font-weight: 600; background: #fafaf8; }
  .weight-row .unit { font-size: 12px; color: #999; flex-shrink: 0; }
  .prev-weight { font-size: 11px; color: #999; margin-top: 4px; }
  .check-row { display: flex; align-items: center; gap: 10px; margin-top: 10px; padding-top: 10px; border-top: 1px solid #f0efe9; }
  .check-row input[type=checkbox] { width: 20px; height: 20px; accent-color: #e8722c; }
  .check-row label { font-size: 13px; color: #555; font-weight: 600; }
  .simple-item { background: #fff; border: 1px solid #e6e4dc; border-radius: 12px; padding: 12px 14px; margin-bottom: 10px; font-size: 14px; line-height: 1.5; }
  .checkpoint-card { background: #fff; border: 1px solid #e6e4dc; border-radius: 12px; padding: 14px; margin-bottom: 12px; }
  .checkpoint-card h3 { margin: 0 0 10px; font-size: 15px; display: flex; justify-content: space-between; align-items: center; }
  .cp-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .cp-row label { font-size: 13px; color: #666; width: 60px; flex-shrink: 0; }
  .cp-row input { flex: 1; padding: 8px 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
  .save-toast { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%) translateY(100px); background: #1c1c1a; color: #fff; padding: 10px 18px; border-radius: 20px; font-size: 13px; font-weight: 600; transition: transform 0.25s ease; z-index: 20; }
  .save-toast.show { transform: translateX(-50%) translateY(0); }
  .rest-note { font-size: 13px; color: #666; background: #fff; border: 1px solid #e6e4dc; border-radius: 12px; padding: 14px; text-align: center; }
  .day-complete-banner { background: rgba(76, 175, 80, 0.16); border: 1px solid rgba(76, 175, 80, 0.45); color: #256029; border-radius: 10px; padding: 10px 12px; font-size: 13px; font-weight: 600; margin-bottom: 14px; }
  .tab-check { color: #4caf50; font-weight: 900; margin-left: 4px; }
  .progress-ex-card { background: #fff; border: 1px solid #e6e4dc; border-radius: 12px; padding: 12px 14px; margin-bottom: 12px; }
  .progress-ex-card h4 { margin: 0 0 8px; font-size: 14px; }
  .progress-ex-card .no-data { font-size: 12px; color: #aaa; padding: 10px 0; text-align: center; }
  svg.chart { width: 100%; height: auto; display: block; }
  .chart-stats { display: flex; gap: 16px; margin-top: 8px; font-size: 11px; color: #888; }
  .chart-stats strong { color: #1c1c1a; font-size: 13px; }
  .goal-screen { padding: 30px 20px; text-align: center; }
  .goal-screen h2 { font-size: 20px; margin-bottom: 8px; }
  .goal-screen p { font-size: 14px; color: #777; margin-bottom: 24px; }
  .goal-btn { display: block; width: 100%; padding: 16px; margin-bottom: 12px; background: #fff; border: 2px solid #e6e4dc; border-radius: 12px; font-size: 15px; font-weight: 600; color: #1c1c1a; text-align: left; }
  .goal-btn .desc { font-size: 12px; color: #888; font-weight: 400; margin-top: 4px; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 50; display: flex; align-items: flex-end; }
  .modal-sheet { background: #fff; width: 100%; border-radius: 20px 20px 0 0; padding: 20px; max-height: 70vh; overflow-y: auto; }
  .modal-sheet h3 { margin: 0 0 4px; font-size: 17px; }
  .modal-sheet .modal-sub { font-size: 13px; color: #888; margin-bottom: 16px; }
  .swap-option { display: flex; justify-content: space-between; align-items: center; padding: 12px; border: 1px solid #e6e4dc; border-radius: 10px; margin-bottom: 8px; }
  .swap-option-name { font-size: 14px; font-weight: 600; }
  .swap-btns { display: flex; gap: 6px; }
  .swap-btn { font-size: 12px; font-weight: 600; padding: 6px 10px; border-radius: 8px; border: none; }
  .swap-btn.today { background: #eef3fb; color: #1c3a7a; }
  .swap-btn.permanent { background: #e8722c; color: #fff; }
  .modal-close { width: 100%; padding: 12px; background: #f0efe9; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; margin-top: 10px; }
  .cp-delete-btn { font-size: 11px; color: #b31942; background: none; border: none; font-weight: 600; }
</style>
</head>
<body>

<div id="app"></div>
<div class="save-toast" id="toast">Saved</div>

<script>
const YT = (q) => `https://www.youtube.com/results?search_query=${encodeURIComponent(q)}`;

const exerciseLibrary = {
  chest_press_machine: { name: 'Machine chest press', muscle: 'chest', scheme: '3 x 10', link: YT('machine chest press proper form') },
  incline_db_press: { name: 'Incline dumbbell press', muscle: 'chest', scheme: '3 x 10', link: YT('incline dumbbell press proper form') },
  flat_db_press: { name: 'Flat dumbbell press', muscle: 'chest', scheme: '3 x 10', link: YT('flat dumbbell press proper form') },
  pushup: { name: 'Push-up', muscle: 'chest', scheme: '3 x 12', link: YT('push up proper form'), noWeight: true },
  cable_chest_press: { name: 'Standing cable chest press', muscle: 'chest', scheme: '3 x 12', link: YT('standing cable chest press form') },

  shoulder_press_machine: { name: 'Seated shoulder press', muscle: 'shoulders', scheme: '3 x 10', link: YT('seated shoulder press machine form') },
  db_shoulder_press: { name: 'Dumbbell shoulder press', muscle: 'shoulders', scheme: '3 x 10', link: YT('dumbbell shoulder press proper form') },
  cable_lateral_raise: { name: 'Cable lateral raise', muscle: 'shoulders', scheme: '3 x 12', link: YT('cable lateral raise form') },
  db_lateral_raise: { name: 'Dumbbell lateral raise', muscle: 'shoulders', scheme: '3 x 12', link: YT('dumbbell lateral raise form') },

  triceps_pushdown: { name: 'Triceps rope pushdown', muscle: 'triceps', scheme: '3 x 12', link: YT('triceps rope pushdown proper form') },
  triceps_kickback: { name: 'Triceps kickback', muscle: 'triceps', scheme: '3 x 12', link: YT('triceps kickback proper form') },
  overhead_triceps_ext: { name: 'Overhead triceps extension', muscle: 'triceps', scheme: '3 x 12', link: YT('overhead triceps extension form') },

  lat_pulldown: { name: 'Lat pulldown', muscle: 'back', scheme: '3 x 10', link: YT('lat pulldown proper form') },
  chest_supported_row: { name: 'Chest supported row', muscle: 'back', scheme: '3 x 10', link: YT('chest supported row machine form') },
  seated_cable_row: { name: 'Seated cable row', muscle: 'back', scheme: '3 x 10', link: YT('seated cable row proper form') },
  face_pull: { name: 'Face pulls', muscle: 'back', scheme: '3 x 15', link: YT('cable face pull proper form') },
  straight_arm_pulldown: { name: 'Straight-arm cable pulldown', muscle: 'back', scheme: '3 x 12', link: YT('straight arm pulldown proper form') },

  hammer_curl: { name: 'Hammer curl', muscle: 'biceps', scheme: '3 x 12', link: YT('dumbbell hammer curl form') },
  cable_curl: { name: 'Cable curl', muscle: 'biceps', scheme: '2 x 12', link: YT('cable curl proper form') },
  db_curl: { name: 'Dumbbell curl', muscle: 'biceps', scheme: '3 x 12', link: YT('dumbbell curl proper form') },

  smith_rdl: { name: 'Smith machine Romanian deadlift', muscle: 'legs_posterior', scheme: '4 x 10', link: YT('smith machine romanian deadlift tutorial') },
  leg_press: { name: 'Leg press', muscle: 'legs_general', scheme: '3 x 12', link: YT('leg press machine proper form') },
  walking_lunge: { name: 'Walking lunges', muscle: 'legs_general', scheme: '2 x 12 each leg', link: YT('walking lunges proper form'), noWeight: true },
  bodyweight_squat: { name: 'Bodyweight squat', muscle: 'legs_general', scheme: '3 x 12', link: YT('bodyweight squat proper form'), noWeight: true },
  goblet_squat: { name: 'Goblet squat', muscle: 'legs_general', scheme: '3 x 10', link: YT('goblet squat proper form') },
  seated_leg_curl: { name: 'Seated leg curl', muscle: 'legs_posterior', scheme: '3 x 12', link: YT('seated leg curl machine form') },
  leg_extension: { name: 'Leg extension', muscle: 'legs_quad', scheme: '3 x 12', link: YT('leg extension machine proper form') },
  calf_raise_machine: { name: 'Calf raise machine', muscle: 'calves', scheme: '3 x 15', link: YT('calf raise machine proper form') },
  bodyweight_calf_raise: { name: 'Bodyweight calf raise', muscle: 'calves', scheme: '3 x 15', link: YT('bodyweight calf raise proper form'), noWeight: true },

  plank: { name: 'Plank', muscle: 'core', scheme: '3 x 45 sec', link: YT('plank proper form'), noWeight: true },
  cable_woodchop: { name: 'Cable wood chop', muscle: 'core', scheme: '3 x 12 each side', link: YT('cable wood chop proper form') },
  ab_crunch_machine: { name: 'Abdominal crunch machine', muscle: 'core', scheme: '3 x 15', link: YT('abdominal crunch machine proper form') },
  farmer_carry: { name: 'Farmer carry', muscle: 'core', scheme: '3 x 45 sec', link: YT('farmer carry proper form'), noWeight: true },

  treadmill: { name: 'Treadmill', muscle: 'cardio', scheme: '5 min', link: null, noWeight: true },
  bike: { name: 'Bike', muscle: 'cardio', scheme: '5 min', link: null, noWeight: true },
  incline_walk: { name: 'Incline walk', muscle: 'cardio', scheme: '10 min', link: null, noWeight: true }
};

const substituteGroups = {};
Object.keys(exerciseLibrary).forEach(function(id) {
  const m = exerciseLibrary[id].muscle;
  if (!substituteGroups[m]) substituteGroups[m] = [];
  substituteGroups[m].push(id);
});

const muscleToTag = {
  chest: 'Push', shoulders: 'Push', triceps: 'Push',
  back: 'Pull', biceps: 'Pull',
  legs_posterior: 'Legs', legs_general: 'Legs', legs_quad: 'Legs', calves: 'Legs',
  core: 'Core', cardio: 'Cardio'
};

function deriveDayTag(exerciseIds) {
  if (!exerciseIds || exerciseIds.length === 0) return '';
  const tagCounts = {};
  exerciseIds.forEach(function(id) {
    const muscle = exerciseLibrary[id].muscle;
    const tag = muscleToTag[muscle] || 'Mixed';
    tagCounts[tag] = (tagCounts[tag] || 0) + 1;
  });
  const sorted = Object.keys(tagCounts).map(function(k) { return [k, tagCounts[k]]; }).sort(function(a, b) { return b[1] - a[1]; });
  if (sorted.length === 0) return '';
  if (sorted.length === 1) return sorted[0][0];
  if (sorted[0][1] === sorted[1][1]) {
    return sorted[0][0] + '/' + sorted[1][0];
  }
  return sorted[0][0];
}

const mobility = {
  items: [
    '10 bodyweight squats',
    '10 arm circles forward/backward',
    '10 band pull-aparts (or light cable rear delt pulls)',
    '10 cat-cow stretches',
    '30-second hamstring stretch'
  ]
};

const goalTemplates = {
  get_stronger: {
    label: 'Get Stronger',
    desc: 'Push/Pull/Legs split focused on building strength across major lifts',
    days: {
      mon: { label: 'Mon Push', warmupId: 'treadmill', exerciseIds: ['chest_press_machine', 'incline_db_press', 'shoulder_press_machine', 'cable_lateral_raise', 'triceps_pushdown'], finisherId: 'incline_walk' },
      tue: { label: 'Tue Legs', warmupId: 'bike', exerciseIds: ['smith_rdl', 'leg_press', 'walking_lunge', 'seated_leg_curl', 'calf_raise_machine', 'plank'], finisherId: null },
      wed: { label: 'Wed Recovery', rest: true, items: ['10,000+ steps today', 'Stretch: hamstrings', 'Stretch: hip flexors', 'Stretch: chest', 'Stretch: upper back'] },
      thu: { label: 'Thu Pull', warmupId: 'treadmill', exerciseIds: ['lat_pulldown', 'chest_supported_row', 'seated_cable_row', 'face_pull', 'hammer_curl', 'cable_curl'], finisherId: 'incline_walk' },
      fri: { label: 'Fri Full Body', warmupId: 'treadmill', exerciseIds: ['goblet_squat', 'incline_db_press', 'lat_pulldown', 'smith_rdl', 'cable_woodchop', 'farmer_carry'], finisherId: 'incline_walk' },
      sat: { label: 'Sat Cardio', rest: true, items: ['45-60 min walk, OR bike for 30 min', 'Goal: 10,000-12,000 steps'] },
      sun: { label: 'Sun Rest', rest: true, items: ['Rest', 'Stretch', 'Foam roll', 'Walk if desired'] }
    }
  },
  strengthen_core: {
    label: 'Strengthen Core',
    desc: 'Full-body training with extra core volume each session',
    days: {
      mon: { label: 'Mon Full Body', warmupId: 'treadmill', exerciseIds: ['goblet_squat', 'chest_press_machine', 'plank', 'cable_woodchop'], finisherId: 'incline_walk' },
      tue: { label: 'Tue Full Body', warmupId: 'bike', exerciseIds: ['lat_pulldown', 'seated_leg_curl', 'ab_crunch_machine', 'farmer_carry'], finisherId: null },
      wed: { label: 'Wed Recovery', rest: true, items: ['10,000+ steps today', 'Stretch: hip flexors', 'Stretch: chest'] },
      thu: { label: 'Thu Full Body', warmupId: 'treadmill', exerciseIds: ['leg_press', 'shoulder_press_machine', 'plank', 'cable_woodchop'], finisherId: 'incline_walk' },
      fri: { label: 'Fri Full Body', warmupId: 'treadmill', exerciseIds: ['smith_rdl', 'chest_supported_row', 'ab_crunch_machine', 'farmer_carry'], finisherId: 'incline_walk' },
      sat: { label: 'Sat Cardio', rest: true, items: ['45-60 min walk, OR bike for 30 min', 'Goal: 10,000-12,000 steps'] },
      sun: { label: 'Sun Rest', rest: true, items: ['Rest', 'Stretch', 'Foam roll'] }
    }
  },
  general_fitness: {
    label: 'General Fitness',
    desc: 'Well-rounded full body training, moderate volume, sustainable pace',
    days: {
      mon: { label: 'Mon Full Body', warmupId: 'treadmill', exerciseIds: ['chest_press_machine', 'lat_pulldown', 'goblet_squat', 'plank'], finisherId: 'incline_walk' },
      tue: { label: 'Tue Recovery', rest: true, items: ['20-30 min walk', 'Stretch major muscle groups'] },
      wed: { label: 'Wed Full Body', warmupId: 'bike', exerciseIds: ['leg_press', 'seated_cable_row', 'shoulder_press_machine', 'ab_crunch_machine'], finisherId: null },
      thu: { label: 'Thu Recovery', rest: true, items: ['20-30 min walk', 'Stretch major muscle groups'] },
      fri: { label: 'Fri Full Body', warmupId: 'treadmill', exerciseIds: ['smith_rdl', 'incline_db_press', 'lat_pulldown', 'plank'], finisherId: 'incline_walk' },
      sat: { label: 'Sat Cardio', rest: true, items: ['30-45 min walk or bike', 'Goal: 8,000-10,000 steps'] },
      sun: { label: 'Sun Rest', rest: true, items: ['Rest', 'Stretch', 'Foam roll'] }
    }
  }
};

let state = {
  screen: 'day',
  goal: null,
  activePlan: null,
  week: 1,
  cycle: 1,
  day: 'mon',
  weights: {},
  checkpoints: { start: {}, week4: {}, week8: {} },
  archivedCheckpoints: [],
  goalHistory: []
};

function todayStr() { return new Date().toISOString().split('T')[0]; }

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 1400);
}

async function saveState() {
  try {
    localStorage.setItem('workout-state-v3', JSON.stringify(state));
    toast('Saved');
  } catch (e) {
    toast('Save failed, try again');
  }
}

async function loadState() {
  try {
    const raw = localStorage.getItem('workout-state-v3');
    if (raw) {
      state = Object.assign({}, state, JSON.parse(raw));
    }
  } catch (e) {}
  if (!state.goal || !state.activePlan) {
    state.screen = 'goal_select';
  }
  render();
}

function chooseGoal(goalKey) {
  state.goal = goalKey;
  state.activePlan = JSON.parse(JSON.stringify(goalTemplates[goalKey].days));
  state.screen = 'day';
  state.week = 1;
  saveState();
  render();
}

function getEntry(exId, week, cycle) {
  const c = cycle !== undefined ? cycle : state.cycle;
  const k = exId + '::c' + c + '::w' + week;
  return state.weights[k] || null;
}
function setEntry(exId, week, field, val) {
  const k = exId + '::c' + state.cycle + '::w' + week;
  if (!state.weights[k]) state.weights[k] = {};
  state.weights[k][field] = val;
  saveState();
}
function clearEntry(exId, week) {
  const k = exId + '::c' + state.cycle + '::w' + week;
  delete state.weights[k];
  saveState();
}
function getPrevEntry(exId, week) {
  for (let w = week - 1; w >= 1; w--) {
    const e = getEntry(exId, w);
    if (e && (e.weight || e.done)) return { week: w, entry: e };
  }
  if (state.cycle > 1) {
    for (let c = state.cycle - 1; c >= 1; c--) {
      for (let w = 8; w >= 1; w--) {
        const e = getEntry(exId, w, c);
        if (e && (e.weight || e.done)) return { week: w, entry: e, cycle: c };
      }
    }
  }
  return null;
}
function getAllEntries(exId) {
  const results = [];
  for (let c = 1; c <= state.cycle; c++) {
    for (let w = 1; w <= 8; w++) {
      const e = getEntry(exId, w, c);
      if (e && e.weight) results.push({ week: w, cycle: c, weight: parseFloat(e.weight), date: e.date });
    }
  }
  return results;
}

function isDayComplete(dayKey, week) {
  const day = state.activePlan[dayKey];
  if (!day) return false;
  if (day.rest) {
    const e = getEntry('__rest_' + dayKey + '__', week);
    return !!(e && e.done);
  }
  const mob = getEntry('__mobility_' + dayKey + '__', week);
  if (!mob || !mob.done) return false;
  const cardio = getEntry('__cardio_' + dayKey + '__', week);
  if (!cardio || !cardio.done) return false;
  for (let i = 0; i < day.exerciseIds.length; i++) {
    const exId = day.exerciseIds[i];
    const ex = exerciseLibrary[exId];
    const e = getEntry(exId, week);
    if (ex.noWeight) {
      if (!e || !e.done) return false;
    } else {
      if (!e || !e.weight) return false;
    }
  }
  if (day.finisherId) {
    const fin = getEntry('__finisher_' + dayKey + '__', week);
    if (!fin || !fin.done) return false;
  }
  return true;
}

function isWeekComplete(week) {
  const keys = Object.keys(state.activePlan);
  for (let i = 0; i < keys.length; i++) {
    if (!isDayComplete(keys[i], week)) return false;
  }
  return true;
}

function openSwapModal(dayKey, exIndex) {
  const day = state.activePlan[dayKey];
  const currentExId = day.exerciseIds[exIndex];
  const muscle = exerciseLibrary[currentExId].muscle;
  const options = (substituteGroups[muscle] || []).filter(function(id) { return id !== currentExId; });

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  const sheet = document.createElement('div');
  sheet.className = 'modal-sheet';
  sheet.innerHTML = '<h3>Swap ' + exerciseLibrary[currentExId].name + '</h3><div class="modal-sub">Choose a replacement that works the same muscle group</div>';

  if (options.length === 0) {
    const nd = document.createElement('p');
    nd.style.cssText = 'font-size:13px;color:#999;';
    nd.textContent = 'No alternatives available for this muscle group yet.';
    sheet.appendChild(nd);
  }

  options.forEach(function(optId) {
    const opt = document.createElement('div');
    opt.className = 'swap-option';
    const optName = document.createElement('div');
    optName.className = 'swap-option-name';
    optName.textContent = exerciseLibrary[optId].name;
    opt.appendChild(optName);

    const btns = document.createElement('div');
    btns.className = 'swap-btns';

    const todayBtn = document.createElement('button');
    todayBtn.className = 'swap-btn today';
    todayBtn.textContent = 'Just today';
    todayBtn.onclick = function() {
      state.activePlan[dayKey].exerciseIds[exIndex] = optId;
      saveState();
      document.body.removeChild(overlay);
      render();
      toast('Swapped for today');
    };
    btns.appendChild(todayBtn);

    const permBtn = document.createElement('button');
    permBtn.className = 'swap-btn permanent';
    permBtn.textContent = 'Always';
    permBtn.onclick = function() {
      state.activePlan[dayKey].exerciseIds[exIndex] = optId;
      saveState();
      document.body.removeChild(overlay);
      render();
      toast('Swapped going forward');
    };
    btns.appendChild(permBtn);

    opt.appendChild(btns);
    sheet.appendChild(opt);
  });

  const closeBtn = document.createElement('button');
  closeBtn.className = 'modal-close';
  closeBtn.textContent = 'Cancel';
  closeBtn.onclick = function() { document.body.removeChild(overlay); };
  sheet.appendChild(closeBtn);

  overlay.appendChild(sheet);
  overlay.onclick = function(e) { if (e.target === overlay) document.body.removeChild(overlay); };
  document.body.appendChild(overlay);
}

function renderExerciseCard(dayKey, exId, exIndex) {
  const ex = exerciseLibrary[exId];
  const card = document.createElement('div');
  card.className = 'card';

  const top = document.createElement('div');
  top.className = 'ex-top';
  const left = document.createElement('div');
  left.innerHTML = '<p class="ex-name">' + ex.name + '</p><p class="ex-scheme">' + ex.scheme + '</p>';
  top.appendChild(left);

  const actions = document.createElement('div');
  actions.className = 'ex-actions';
  if (ex.link) {
    const a = document.createElement('a');
    a.className = 'ex-btn';
    a.href = ex.link;
    a.target = '_blank';
    a.textContent = 'How-to';
    actions.appendChild(a);
  }
  const swapBtn = document.createElement('button');
  swapBtn.className = 'ex-btn';
  swapBtn.style.cssText = 'background:#eef3fb;border-color:#b9cdf0;color:#1c3a7a;';
  swapBtn.textContent = 'Swap';
  swapBtn.onclick = function() { openSwapModal(dayKey, exIndex); };
  actions.appendChild(swapBtn);
  top.appendChild(actions);
  card.appendChild(top);

  if (ex.noWeight) {
    const entry = getEntry(exId, state.week) || {};
    const row = document.createElement('div');
    row.className = 'check-row';
    row.innerHTML = '<input type="checkbox" ' + (entry.done ? 'checked' : '') + ' /> <label>Completed this week</label>';
    const input = row.querySelector('input');
    input.addEventListener('change', function() {
      if (input.checked) {
        setEntry(exId, state.week, 'done', true);
        setEntry(exId, state.week, 'date', todayStr());
      } else {
        clearEntry(exId, state.week);
      }
      render();
    });
    card.appendChild(row);
    if (entry.done) card.classList.add('ex-complete');
    return card;
  }

  const entry = getEntry(exId, state.week) || {};
  const row = document.createElement('div');
  row.className = 'weight-row';
  row.innerHTML = '<label>This week</label><input type="number" inputmode="decimal" placeholder="0" value="' + (entry.weight || '') + '" /><span class="unit">lbs</span>';
  const input = row.querySelector('input');
  input.addEventListener('change', function() {
    if (input.value) {
      setEntry(exId, state.week, 'weight', input.value);
      setEntry(exId, state.week, 'date', todayStr());
    } else {
      clearEntry(exId, state.week);
    }
    render();
  });
  card.appendChild(row);

  if (entry.date) {
    const dn = document.createElement('div');
    dn.className = 'prev-weight';
    dn.textContent = 'Logged: ' + entry.date;
    card.appendChild(dn);
  }

  const prev = getPrevEntry(exId, state.week);
  if (prev) {
    const p = document.createElement('div');
    p.className = 'prev-weight';
    const cTag = prev.cycle ? ('Cycle ' + prev.cycle + ', ') : '';
    p.textContent = cTag + 'Week ' + prev.week + ': ' + prev.entry.weight + ' lbs';
    card.appendChild(p);
  }

  if (entry.weight) card.classList.add('ex-complete');
  return card;
}

function buildLineChart(title, points, color) {
  const wrap = document.createElement('div');
  wrap.className = 'progress-ex-card';
  if (title) {
    const h = document.createElement('h4');
    h.textContent = title;
    wrap.appendChild(h);
  }
  const valid = points.filter(function(p) { return p.val !== null && !isNaN(p.val); });
  if (valid.length < 2) {
    const nd = document.createElement('div');
    nd.className = 'no-data';
    nd.textContent = valid.length === 0 ? 'No data entered yet' : 'Need at least 2 data points to graph';
    wrap.appendChild(nd);
    return wrap;
  }
  const W = 320, H = 140, pad = 30;
  const vals = valid.map(function(p) { return p.val; });
  const min = Math.min.apply(null, vals), max = Math.max.apply(null, vals);
  const range = max - min || 1;
  const stepX = (W - pad * 2) / (points.length - 1);
  let pathD = '', dots = '', labels = '';
  points.forEach(function(p, i) {
    if (p.val === null || isNaN(p.val)) return;
    const x = pad + i * stepX;
    const y = H - pad - ((p.val - min) / range) * (H - pad * 2);
    pathD += (pathD ? 'L' : 'M') + x + ',' + y + ' ';
    dots += '<circle cx="' + x + '" cy="' + y + '" r="4" fill="' + color + '"/>';
    labels += '<text x="' + x + '" y="' + (H - 6) + '" font-size="10" fill="#999" text-anchor="middle">' + p.label + '</text>';
    labels += '<text x="' + x + '" y="' + (y - 10) + '" font-size="11" fill="#333" text-anchor="middle" font-weight="600">' + p.val + '</text>';
  });
  wrap.innerHTML += '<svg class="chart" viewBox="0 0 ' + W + ' ' + H + '"><path d="' + pathD + '" fill="none" stroke="' + color + '" stroke-width="2.5"/>' + dots + labels + '</svg>';
  const first = valid[0].val, last = valid[valid.length - 1].val;
  const diff = (last - first).toFixed(1);
  const stats = document.createElement('div');
  stats.className = 'chart-stats';
  stats.innerHTML = '<div>Start: <strong>' + first + '</strong></div><div>Latest: <strong>' + last + '</strong></div><div>Change: <strong>' + (diff > 0 ? '+' : '') + diff + '</strong></div>';
  wrap.appendChild(stats);
  return wrap;
}

function deleteCheckpoint(cpKey) {
  const step1 = confirm('Remove this checkpoint entry? This cannot be undone.');
  if (!step1) return;
  const step2 = confirm('Are you sure? This will permanently delete this checkpoint data.');
  if (!step2) return;
  state.checkpoints[cpKey] = {};
  saveState();
  render();
  toast('Checkpoint removed');
}

function renderCheckpointsScreen(container) {
  const content = document.createElement('div');
  content.className = 'content';

  const intro = document.createElement('div');
  intro.className = 'banner';
  intro.innerHTML = '<strong>Monthly checkpoints - Cycle ' + state.cycle + ':</strong> log your numbers at start, week 4, and week 8. Take photos on your phone and keep them in your own Photos app.';
  content.appendChild(intro);

  const defs = [{ key: 'start', title: 'Start' }, { key: 'week4', title: 'Week 4' }, { key: 'week8', title: 'Week 8' }];
  defs.forEach(function(def) {
    const card = document.createElement('div');
    card.className = 'checkpoint-card';
    const h = document.createElement('h3');
    const hasData = state.checkpoints[def.key] && (state.checkpoints[def.key].weight || state.checkpoints[def.key].waist);
    h.innerHTML = '<span>' + def.title + '</span>';
    if (hasData) {
      const delBtn = document.createElement('button');
      delBtn.className = 'cp-delete-btn';
      delBtn.textContent = 'Remove';
      delBtn.onclick = function() { deleteCheckpoint(def.key); };
      h.appendChild(delBtn);
    }
    card.appendChild(h);
    card.appendChild(renderCheckpointField(def.key, 'weight', 'Weight', 'lbs'));
    card.appendChild(renderCheckpointField(def.key, 'waist', 'Waist', 'inches'));
    content.appendChild(card);
  });

  const measLabel = document.createElement('div');
  measLabel.className = 'section-label';
  measLabel.textContent = 'Measurement trend (all cycles)';
  content.appendChild(measLabel);

  let allPoints = [];
  (state.archivedCheckpoints || []).forEach(function(arch) {
    defs.forEach(function(def) {
      allPoints.push({ label: 'C' + arch.cycle + ' ' + def.title, weight: parseFloat(arch[def.key] && arch[def.key].weight) || null, waist: parseFloat(arch[def.key] && arch[def.key].waist) || null });
    });
  });
  defs.forEach(function(def) {
    allPoints.push({ label: (state.cycle > 1 ? ('C' + state.cycle + ' ') : '') + def.title, weight: parseFloat(state.checkpoints[def.key] && state.checkpoints[def.key].weight) || null, waist: parseFloat(state.checkpoints[def.key] && state.checkpoints[def.key].waist) || null });
  });

  content.appendChild(buildLineChart('Weight (lbs)', allPoints.map(function(p) { return { label: p.label, val: p.weight }; }), '#e8722c'));
  content.appendChild(buildLineChart('Waist (in)', allPoints.map(function(p) { return { label: p.label, val: p.waist }; }), '#3a7ae8'));
  container.appendChild(content);
}

function renderProgressScreen(container) {
  const content = document.createElement('div');
  content.className = 'content';

  const intro = document.createElement('div');
  intro.className = 'banner';
  intro.innerHTML = '<strong>Exercise progress - Cycle ' + state.cycle + ':</strong> every exercise you have logged, tracked across weeks and past cycles, even if swapped out of your current plan.';
  content.appendChild(intro);

  const restartWrap = document.createElement('div');
  restartWrap.className = 'card';
  restartWrap.innerHTML = '<p class="ex-name" style="margin-bottom:6px;">Finished this 8-week cycle?</p><p class="ex-scheme" style="margin-bottom:10px;">Choose a new goal or repeat this one. All past data stays saved for these graphs.</p>';
  const restartBtn = document.createElement('button');
  restartBtn.textContent = 'Start New Cycle';
  restartBtn.style.cssText = 'width:100%;padding:12px;background:#1c1c1a;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;';
  restartBtn.onclick = function() {
    if (confirm('Start a new cycle? Your current cycle data stays saved for progress tracking, and you will pick a goal for the new cycle.')) {
      const hasData = state.checkpoints && ((state.checkpoints.start && state.checkpoints.start.weight) || (state.checkpoints.week4 && state.checkpoints.week4.weight) || (state.checkpoints.week8 && state.checkpoints.week8.weight));
      if (hasData) {
        state.archivedCheckpoints.push({ cycle: state.cycle, start: state.checkpoints.start, week4: state.checkpoints.week4, week8: state.checkpoints.week8 });
      }
      state.goalHistory.push({ cycle: state.cycle, goal: state.goal });
      state.checkpoints = { start: {}, week4: {}, week8: {} };
      state.cycle += 1;
      state.week = 1;
      state.screen = 'goal_select';
      saveState();
      render();
    }
  };
  restartWrap.appendChild(restartBtn);
  content.appendChild(restartWrap);

  const seen = {};
  Object.keys(exerciseLibrary).forEach(function(exId) {
    const entries = getAllEntries(exId);
    if (entries.length === 0) return;
    seen[exId] = true;
    const card = document.createElement('div');
    card.className = 'progress-ex-card';
    const h = document.createElement('h4');
    h.textContent = exerciseLibrary[exId].name;
    card.appendChild(h);
    if (entries.length < 2) {
      const nd = document.createElement('div');
      nd.className = 'no-data';
      nd.textContent = '1 entry logged (Week ' + entries[0].week + ': ' + entries[0].weight + ' lbs) - need 2+ to graph';
      card.appendChild(nd);
      content.appendChild(card);
      return;
    }
    const points = entries.map(function(e) { return { label: (state.cycle > 1 ? ('C' + e.cycle + 'W' + e.week) : ('Wk' + e.week)), val: e.weight }; });
    const chart = buildLineChart('', points, '#e8722c');
    card.innerHTML += chart.innerHTML;
    content.appendChild(card);
  });

  if (Object.keys(seen).length === 0) {
    const nd = document.createElement('div');
    nd.className = 'rest-note';
    nd.textContent = 'No weighted exercises logged yet.';
    content.appendChild(nd);
  }

  container.appendChild(content);
}

function migrateOldData(oldRawStr) {
  const parsedOld = JSON.parse(oldRawStr);
  const migratedWeights = {};
  if (parsedOld.weights) {
    Object.keys(parsedOld.weights).forEach(function(oldKey) {
      const match = oldKey.match(/^(.+)::c(\d+)::w(\d+)$/);
      if (match) {
        migratedWeights[oldKey] = parsedOld.weights[oldKey];
      }
    });
  }
  return migratedWeights;
}

function renderDebugScreen(container) {
  const content = document.createElement('div');
  content.className = 'content';

  const intro = document.createElement('div');
  intro.className = 'banner';
  intro.innerHTML = '<strong>Storage check:</strong> everything saved on this phone right now.';
  content.appendChild(intro);

  const allKeysCard = document.createElement('div');
  allKeysCard.className = 'progress-ex-card';
  let html = '<h4>All localStorage keys on this site</h4>';
  if (localStorage.length === 0) {
    html += '<p style="font-size:13px;">No keys found at all.</p>';
  } else {
    html += '<p style="font-size:13px;">Found ' + localStorage.length + ' key(s):</p>';
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      const v = localStorage.getItem(k);
      html += '<div style="font-size:12px;padding:4px 0;border-top:1px solid #f0efe9;"><strong>' + k + '</strong> (' + (v ? v.length : 0) + ' chars)</div>';
    }
  }
  allKeysCard.innerHTML = html;
  content.appendChild(allKeysCard);

  const oldV2 = localStorage.getItem('workout-state-v2');
  if (oldV2) {
    const card = document.createElement('div');
    card.className = 'progress-ex-card';
    card.innerHTML = '<h4>Previous version data found (workout-state-v2)</h4><p style="font-size:13px;">This is from before the goal-based rebuild. Weight data uses a different format and is not automatically imported, since exercises are now tracked by stable IDs rather than names.</p>';
    content.appendChild(card);
  }

  container.appendChild(content);
}

function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  if (state.screen === 'goal_select') {
    renderGoalSelect();
    return;
  }

  renderDayTabs(app);
  renderWeekPicker(app);

  if (state.screen === 'checkpoints') {
    renderCheckpointsScreen(app);
  } else if (state.screen === 'progress') {
    renderProgressScreen(app);
  } else if (state.screen === 'debug') {
    renderDebugScreen(app);
  } else {
    renderDayContent(app);
  }
}

loadState();
</script>
