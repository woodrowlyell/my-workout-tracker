<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f4f3ef;
    color: #1c1c1a;
    padding-bottom: 80px;
  }
  .header {
    background: #1c1c1a;
    color: #fff;
    padding: 20px 16px 16px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header h1 { margin: 0 0 4px; font-size: 18px; font-weight: 600; }
  .header .sub { font-size: 12px; color: #b8b7b0; }
  .restrict-toggle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #2a2a27;
    border-radius: 10px;
    padding: 8px 12px;
    margin-top: 10px;
    font-size: 12px;
  }
  .restrict-toggle .label { color: #d5d4cd; font-weight: 600; }
  .switch {
    position: relative;
    width: 42px;
    height: 24px;
    flex-shrink: 0;
  }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute; cursor: pointer; inset: 0;
    background: #555; border-radius: 24px; transition: 0.2s;
  }
  .slider:before {
    content: ""; position: absolute; height: 18px; width: 18px;
    left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: 0.2s;
  }
  input:checked + .slider { background: #e8722c; }
  input:checked + .slider:before { transform: translateX(18px); }
  .week-picker {
    display: flex;
    gap: 6px;
    margin-top: 12px;
    overflow-x: auto;
    padding-bottom: 4px;
  }
  .week-btn {
    flex-shrink: 0;
    padding: 6px 12px;
    border-radius: 20px;
    border: 1px solid #444;
    background: #2a2a27;
    color: #d5d4cd;
    font-size: 13px;
    white-space: nowrap;
  }
  .week-btn.active {
    background: #e8722c;
    border-color: #e8722c;
    color: #fff;
    font-weight: 600;
  }
  .day-tabs {
    display: flex;
    overflow-x: auto;
    gap: 6px;
    padding: 10px 16px;
    background: #fff;
    border-bottom: 1px solid #e2e0d8;
    position: sticky;
    top: 0;
    z-index: 9;
  }
  .day-tab {
    flex-shrink: 0;
    padding: 8px 14px;
    border-radius: 8px;
    border: 1px solid #ddd;
    background: #f7f6f2;
    font-size: 13px;
    font-weight: 600;
    color: #555;
  }
  .day-tab.active {
    background: #1c1c1a;
    color: #fff;
    border-color: #1c1c1a;
  }
  .content { padding: 14px; }
  .banner {
    background: #fdf0e6;
    border: 1px solid #f0cba4;
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 13px;
    color: #7a4a1c;
    margin-bottom: 14px;
    line-height: 1.4;
  }
  .restrict-banner {
    background: #eef3fb;
    border: 1px solid #b9cdf0;
    color: #1c3a7a;
  }
  .section-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #999;
    font-weight: 700;
    margin: 18px 0 8px;
  }
  .section-label:first-child { margin-top: 0; }
  .card {
    background: #fff;
    border: 1px solid #e6e4dc;
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 10px;
  }
  .card.ex-complete,
  .simple-item.ex-complete {
    background: rgba(76, 175, 80, 0.14);
    border-color: rgba(76, 175, 80, 0.4);
  }
  .ex-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
  }
  .ex-name {
    font-size: 15px;
    font-weight: 600;
    margin: 0 0 2px;
  }
  .ex-scheme {
    font-size: 13px;
    color: #777;
    margin: 0;
  }
  .ex-link {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    font-weight: 600;
    color: #e8722c;
    text-decoration: none;
    border: 1px solid #f0cba4;
    background: #fdf0e6;
    padding: 6px 10px;
    border-radius: 8px;
    white-space: nowrap;
  }
  .ex-note {
    font-size: 12px;
    color: #a15a1c;
    background: #fdf0e6;
    border-radius: 6px;
    padding: 4px 8px;
    margin-top: 6px;
    display: inline-block;
  }
  .weight-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid #f0efe9;
  }
  .weight-row label {
    font-size: 12px;
    color: #888;
    flex-shrink: 0;
  }
  .weight-row input[type=number] {
    flex: 1;
    min-width: 0;
    padding: 8px 10px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    background: #fafaf8;
  }
  .weight-row .unit { font-size: 12px; color: #999; flex-shrink: 0; }
  .prev-weight {
    font-size: 11px;
    color: #999;
    margin-top: 4px;
  }
  .check-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid #f0efe9;
  }
  .check-row input[type=checkbox] {
    width: 20px;
    height: 20px;
    accent-color: #e8722c;
  }
  .check-row label { font-size: 13px; color: #555; font-weight: 600; }
  .simple-item {
    background: #fff;
    border: 1px solid #e6e4dc;
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 10px;
    font-size: 14px;
    line-height: 1.5;
  }
  .checkpoint-card {
    background: #fff;
    border: 1px solid #e6e4dc;
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 12px;
  }
  .checkpoint-card h3 { margin: 0 0 10px; font-size: 15px; }
  .cp-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .cp-row label { font-size: 13px; color: #666; width: 60px; flex-shrink: 0; }
  .cp-row input {
    flex: 1;
    padding: 8px 10px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 14px;
  }
  .save-toast {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #1c1c1a;
    color: #fff;
    padding: 10px 18px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    transition: transform 0.25s ease;
    z-index: 20;
  }
  .save-toast.show { transform: translateX(-50%) translateY(0); }
  .icon {
    width: 14px;
    height: 14px;
    display: inline-block;
    flex-shrink: 0;
  }
  .rest-note {
    font-size: 13px;
    color: #666;
    background: #fff;
    border: 1px solid #e6e4dc;
    border-radius: 12px;
    padding: 14px;
    text-align: center;
  }
  .content.day-complete .card,
  .content.day-complete .simple-item {
    background: rgba(76, 175, 80, 0.14);
    border-color: rgba(76, 175, 80, 0.4);
  }
  .day-complete-banner {
    background: rgba(76, 175, 80, 0.16);
    border: 1px solid rgba(76, 175, 80, 0.45);
    color: #256029;
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 14px;
  }
  .tab-check {
    color: #4caf50;
    font-weight: 900;
    margin-left: 4px;
  }
  .progress-ex-card {
    background: #fff;
    border: 1px solid #e6e4dc;
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 12px;
  }
  .progress-ex-card h4 {
    margin: 0 0 8px;
    font-size: 14px;
  }
  .progress-ex-card .no-data {
    font-size: 12px;
    color: #aaa;
    padding: 10px 0;
    text-align: center;
  }
  svg.chart { width: 100%; height: auto; display: block; }
  .chart-stats {
    display: flex;
    gap: 16px;
    margin-top: 8px;
    font-size: 11px;
    color: #888;
  }
  .chart-stats strong { color: #1c1c1a; font-size: 13px; }
</style>
</head>
<body>

<div class="day-tabs" id="day-tabs"></div>

<div class="header">
  <h1>8-week strength program</h1>
  <div class="sub" id="week-sub">Cycle 1 · Week 1 · Weeks 1-2: leave 2-3 reps in reserve</div>
  <div class="restrict-toggle">
    <span class="label">10 lb restriction mode</span>
    <label class="switch">
      <input type="checkbox" id="restrict-checkbox">
      <span class="slider"></span>
    </label>
  </div>
  <div class="week-picker" id="week-picker"></div>
</div>

<div class="content" id="content"></div>
<div class="content" id="checkpoint-content" style="display:none"></div>
<div class="content" id="progress-content" style="display:none"></div>
<div class="content" id="debug-content" style="display:none"></div>

<div class="save-toast" id="toast">Saved</div>

<script>
const YT = (q) => `https://www.youtube.com/results?search_query=${encodeURIComponent(q)}`;

const mobility = {
  items: [
    '10 bodyweight squats',
    '10 arm circles forward/backward',
    '10 band pull-aparts (or light cable rear delt pulls)',
    '10 cat-cow stretches',
    '30-second hamstring stretch'
  ]
};

const days = {
  mon: {
    label: 'Mon Push',
    warmup: { name: 'Treadmill', scheme: '5 min', link: null },

      { name: 'Cable lateral raise', scheme: '3 x 12', link: YT('cable lateral raise form') },
      { name: 'Triceps rope pushdown', scheme: '3 x 12', link: YT('triceps rope pushdown proper form') }
    ],
    finisher: { name: 'Incline treadmill', scheme: '10 min - 10% incline - 3.2-3.5 mph', link: null }
  },
  tue: {

};

function getPhase(week) {
  if (week <= 2) return 'early';
  if (week <= 4) return 'mid';
  if (week <= 6) return 'late';
  return 'push';
}

let state = {
  week: 1,
  cycle: 1,
  day: 'mon',
  view: 'day',
  restricted: false,
  weights: {},
  checkpoints: { start: {}, week4: {}, week8: {} },
  archivedCheckpoints: []
};

function todayStr() {
  const d = new Date();
  return d.toISOString().split('T')[0];
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 1400);
}

function migrateOldData(oldRawStr) {
  const parsedOld = JSON.parse(oldRawStr);
  const migratedWeights = {};
  if (parsedOld.weights) {
    Object.keys(parsedOld.weights).forEach(function(oldKey) {
      const match = oldKey.match(/^(.+)::w(\d+)$/);
      if (match) {
        const base = match[1];
        const week = match[2];
        const oldVal = parsedOld.weights[oldKey];
        const weightVal = (typeof oldVal === 'object' && oldVal !== null) ? oldVal.weight : oldVal;
        if (weightVal) {
          const newKey = base + '::c1::w' + week;
          migratedWeights[newKey] = {
            weight: weightVal,
            date: (typeof oldVal === 'object' && oldVal.date) ? oldVal.date : todayStr()
          };
        }
      }
    });
  }
  return migratedWeights;
}

async function loadState() {
  try {
    const raw = localStorage.getItem('workout-state-v2');
    if (raw) {
      const parsed = JSON.parse(raw);
      state = Object.assign({}, state, parsed);
    } else {
      const old = localStorage.getItem('workout-state');
      if (old) {
        const migratedWeights = migrateOldData(old);
        const parsedOld = JSON.parse(old);
        state = Object.assign({}, state, parsedOld, { weights: migratedWeights, cycle: 1 });
        saveState();
        toast('Old data imported');
      }
    }
  } catch (e) {}
  render();
}

async function saveState() {
  try {
    localStorage.setItem('workout-state-v2', JSON.stringify(state));
    toast('Saved');
  } catch (e) {
    toast('Save failed, try again');
  }
}

function weightKey(day, exName) {
  return day + '::' + exName;
}

function getEntry(day, exName, week, cycle) {
  const c = cycle !== undefined ? cycle : state.cycle;
  const k = weightKey(day, exName) + '::c' + c + '::w' + week;
  return state.weights[k] || null;
}

function setEntry(day, exName, week, field, val) {
  const k = weightKey(day, exName) + '::c' + state.cycle + '::w' + week;
  if (!state.weights[k]) state.weights[k] = {};
  state.weights[k][field] = val;
  saveState();
}

function clearEntry(day, exName, week) {
  const k = weightKey(day, exName) + '::c' + state.cycle + '::w' + week;
  delete state.weights[k];
  saveState();
}

function getPrevWeight(day, exName, week) {
  for (let w = week - 1; w >= 1; w--) {
    const e = getEntry(day, exName, w);
    if (e && e.weight) return { week: w, val: e.weight, date: e.date };
  }
  if (state.cycle > 1) {
    for (let c = state.cycle - 1; c >= 1; c--) {
      for (let w = 8; w >= 1; w--) {
        const e = getEntry(day, exName, w, c);
        if (e && e.weight) return { week: w, val: e.weight, date: e.date, cycle: c };
      }
    }
  }
  return null;
}

function getAllEntries(day, exName) {
  const results = [];
  for (let c = 1; c <= state.cycle; c++) {
    for (let w = 1; w <= 8; w++) {
      const e = getEntry(day, exName, w, c);
      if (e && e.weight) results.push({ week: w, cycle: c, weight: parseFloat(e.weight), date: e.date });
    }
  }
  return results;
}

function isDayComplete(dayKey) {
  const dayset = state.restricted ? restrictedDays : days;
  const day = dayset[dayKey];
  if (!day) return false;

  if (day.rest) {
    const restEntry = getEntry(dayKey, '__rest_day__', state.week);
    return !!(restEntry && restEntry.done);
  }

  const mobEntry = getEntry(dayKey, '__mobility__', state.week);
  if (!mobEntry || !mobEntry.done) return false;

  const cardioEntry = getEntry(dayKey, '__cardio_warmup__', state.week);
  if (!cardioEntry || !cardioEntry.done) return false;

  for (let i = 0; i < day.exercises.length; i++) {
    const ex = day.exercises[i];
    const e = getEntry(dayKey, ex.name, state.week);
    if (ex.noWeight) {
      if (!e || !e.done) return false;
    } else {
      if (!e || !e.weight) return false;
    }
  }

  if (day.finisher) {
    const finEntry = getEntry(dayKey, '__finisher__', state.week);
    if (!finEntry || !finEntry.done) return false;
  }

  return true;
}

function isWeekComplete(week) {
  const dayset = state.restricted ? restrictedDays : days;
  const savedWeek = state.week;
  state.week = week;
  let allDone = true;
  const keys = Object.keys(dayset);
  for (let i = 0; i < keys.length; i++) {
    const key = keys[i];
    if (!isDayComplete(key)) { allDone = false; break; }
  }
  state.week = savedWeek;
  return allDone;
}

function renderWeekPicker() {
  const wp = document.getElementById('week-picker');
  wp.innerHTML = '';
  for (let i = 1; i <= 8; i++) {
    const b = document.createElement('button');
    b.className = 'week-btn' + (state.week === i ? ' active' : '');
    b.innerHTML = 'Wk ' + i + (isWeekComplete(i) ? '<span class="tab-check">&#10003;</span>' : '');
    b.onclick = (function(i) {
      return function() { state.week = i; saveState(); render(); };
    })(i);
    wp.appendChild(b);
  }
  const phase = progressionText[getPhase(state.week)];
  document.getElementById('week-sub').textContent = 'Cycle ' + state.cycle + ' · Week ' + state.week + ' · ' + phase.title + ': ' + phase.body.split('.')[0] + '.';

  const cb = document.getElementById('restrict-checkbox');
  cb.checked = state.restricted;
  cb.onchange = function() { state.restricted = cb.checked; saveState(); render(); };
}

  const dt = document.getElementById('day-tabs');
  dt.innerHTML = '';
  const dayset = state.restricted ? restrictedDays : days;
  const keys = Object.keys(dayset);
  for (let i = 0; i < keys.length; i++) {
    const key = keys[i];
    const b = document.createElement('button');
    b.className = 'day-tab' + (state.day === key && state.view === 'day' ? ' active' : '');
    b.innerHTML = dayset[key].label + (isDayComplete(key) ? '<span class="tab-check">&#10003;</span>' : '');
    b.onclick = (function(key) {
      return function() { state.day = key; state.view = 'day'; saveState(); render(); };
    })(key);
    dt.appendChild(b);
  }

  const cb = document.createElement('button');
  cb.className = 'day-tab' + (state.view === 'checkpoints' ? ' active' : '');
  cb.textContent = 'Checkpoints';
  cb.onclick = function() { state.view = 'checkpoints'; saveState(); render(); };
  dt.appendChild(cb);

  const pb = document.createElement('button');
  pb.className = 'day-tab' + (state.view === 'progress' ? ' active' : '');
  pb.textContent = 'Progress';
  pb.onclick = function() { state.view = 'progress'; saveState(); render(); };
  dt.appendChild(pb);

  const db = document.createElement('button');
  db.className = 'day-tab' + (state.view === 'debug' ? ' active' : '');
  db.textContent = 'Storage Check';
  db.onclick = function() { state.view = 'debug'; saveState(); render(); };
  dt.appendChild(db);

function renderExerciseCard(day, ex, isWarmup, isFinisher) {
  const card = document.createElement('div');
  card.className = 'card';

  const top = document.createElement('div');
  top.className = 'ex-top';

  const left = document.createElement('div');
  left.innerHTML = '<p class="ex-name">' + ex.name + '</p><p class="ex-scheme">' + ex.scheme + '</p>';
  top.appendChild(left);

  if (ex.link) {
    const a = document.createElement('a');
    a.className = 'ex-link';
    a.href = ex.link;
    a.target = '_blank';
    a.innerHTML = linkIcon() + ' How-to';
    top.appendChild(a);
  }
  card.appendChild(top);

  if (ex.note) {
    const note = document.createElement('div');
    note.className = 'ex-note';
    note.textContent = ex.note;
    card.appendChild(note);
  }

  if (isWarmup || isFinisher) {
    return card;
  }

  if (ex.noWeight) {
    const entry = getEntry(day, ex.name, state.week) || {};
    const row = document.createElement('div');
    row.className = 'check-row';
    row.innerHTML = '<input type="checkbox" ' + (entry.done ? 'checked' : '') + ' /> <label>Completed this week</label>';
    const input = row.querySelector('input');
    input.addEventListener('change', function() {
      if (input.checked) {
        setEntry(day, ex.name, state.week, 'done', true);
        setEntry(day, ex.name, state.week, 'date', todayStr());
      } else {
        clearEntry(day, ex.name, state.week);
      }
      render();
    });
    card.appendChild(row);
    if (entry.done) card.classList.add('ex-complete');
    return card;
  }

  const entry = getEntry(day, ex.name, state.week) || {};
  const row = document.createElement('div');
  row.className = 'weight-row';
  row.innerHTML = '<label>This week</label><input type="number" inputmode="decimal" placeholder="0" value="' + (entry.weight || '') + '" /><span class="unit">lbs</span>';
  const input = row.querySelector('input');
  input.addEventListener('change', function() {
    if (input.value) {
      setEntry(day, ex.name, state.week, 'weight', input.value);
      setEntry(day, ex.name, state.week, 'date', todayStr());
    } else {
      clearEntry(day, ex.name, state.week);
    }
    render();
  });
  card.appendChild(row);

  if (entry.date) {
    const dateNote = document.createElement('div');
    dateNote.className = 'prev-weight';
    dateNote.style.marginTop = '4px';
    dateNote.textContent = 'Logged: ' + entry.date;
    card.appendChild(dateNote);
  }

  const prev = getPrevWeight(day, ex.name, state.week);
  if (prev) {
    const p = document.createElement('div');
    p.className = 'prev-weight';
    const cycleTag = prev.cycle ? ('Cycle ' + prev.cycle + ', ') : '';
    p.textContent = cycleTag + 'Week ' + prev.week + (prev.date ? (' (' + prev.date + ')') : '') + ': ' + prev.val + ' lbs';
    card.appendChild(p);
  }

  const allPast = getAllEntries(day, ex.name).filter(function(e) {
    return !(e.week === state.week && e.cycle === state.cycle);
  });
  if (allPast.length > 1) {
    const histWrap = document.createElement('div');
    histWrap.style.cssText = 'margin-top:6px;padding-top:6px;border-top:1px dashed #eee;';
    allPast.slice().reverse().forEach(function(e) {
      const line = document.createElement('div');
      line.className = 'prev-weight';
      const cTag = state.cycle > 1 ? ('C' + e.cycle + ' ') : '';
      line.textContent = cTag + 'Week ' + e.week + ' (' + (e.date || 'no date') + '): ' + e.weight + ' lbs';
      histWrap.appendChild(line);
    });
    card.appendChild(histWrap);
  }

  if (entry.weight) card.classList.add('ex-complete');
  return card;
}

function renderTrackedBlock(dayKey, blockKey, label) {
  const wrap = document.createElement('div');
  wrap.className = 'simple-item';
  const mobHtml = blockKey === '__mobility__'
    ? mobility.items.map(function(i) { return '<div style="padding:2px 0">' + i + '</div>'; }).join('')
    : '';
  const entry = getEntry(dayKey, blockKey, state.week) || {};
  wrap.innerHTML = mobHtml;
  const checkRow = document.createElement('div');
  checkRow.className = 'check-row';
  checkRow.innerHTML = '<input type="checkbox" ' + (entry.done ? 'checked' : '') + ' /> <label>' + label + '</label>';
  const input = checkRow.querySelector('input');
  input.addEventListener('change', function() {
    if (input.checked) {
      setEntry(dayKey, blockKey, state.week, 'done', true);
      setEntry(dayKey, blockKey, state.week, 'date', todayStr());
    } else {
      clearEntry(dayKey, blockKey, state.week);
    }
    render();
  });
  wrap.appendChild(checkRow);
  if (entry.done) wrap.classList.add('ex-complete');
  return wrap;
}

function renderContent() {
  const content = document.getElementById('content');
  content.innerHTML = '';
  content.classList.remove('day-complete');
  const dayset = state.restricted ? restrictedDays : days;
  const day = dayset[state.day] || dayset[Object.keys(dayset)[0]];

  if (state.restricted) {
    const rb = document.createElement('div');
    rb.className = 'banner restrict-banner';
    rb.innerHTML = '<strong>10 lb restriction mode:</strong> overhead pressing and raises are excluded. All movements shown are at or below shoulder height. Confirm with your doctor before progressing.';
    content.appendChild(rb);
  }

  if (day.rest) {
    const banner = document.createElement('div');
    banner.className = 'rest-note';
    banner.innerHTML = day.items.map(function(i) { return '<div style="padding:4px 0">' + i + '</div>'; }).join('');
    content.appendChild(banner);

    const restEntry = getEntry(state.day, '__rest_day__', state.week) || {};
    const restCard = document.createElement('div');
    restCard.className = 'simple-item' + (restEntry.done ? ' ex-complete' : '');
    const checkRow = document.createElement('div');
    checkRow.className = 'check-row';
    checkRow.innerHTML = '<input type="checkbox" ' + (restEntry.done ? 'checked' : '') + ' /> <label>Completed this day</label>';
    const input = checkRow.querySelector('input');
    input.addEventListener('change', function() {
      if (input.checked) {
        setEntry(state.day, '__rest_day__', state.week, 'done', true);
        setEntry(state.day, '__rest_day__', state.week, 'date', todayStr());
      } else {
        clearEntry(state.day, '__rest_day__', state.week);
      }
      render();
    });
    restCard.appendChild(checkRow);
    content.appendChild(restCard);
    return;
  }

  if (isDayComplete(state.day)) {
    const doneBanner = document.createElement('div');
    doneBanner.className = 'day-complete-banner';
    doneBanner.textContent = 'Day complete, nice work. Your entries are still shown below.';
    content.appendChild(doneBanner);
    content.classList.add('day-complete');
  }

  if (!state.restricted) {
    const banner = document.createElement('div');
    banner.className = 'banner';
    const phase = progressionText[getPhase(state.week)];
    banner.innerHTML = '<strong>' + phase.title + ':</strong> ' + phase.body;
    content.appendChild(banner);
  }

  const mobLabel = document.createElement('div');
  mobLabel.className = 'section-label';
  mobLabel.textContent = 'Mobility warm-up';
  content.appendChild(mobLabel);
  content.appendChild(renderTrackedBlock(state.day, '__mobility__', 'Completed mobility warm-up'));

  const cardioLabel = document.createElement('div');
  cardioLabel.className = 'section-label';
  cardioLabel.textContent = 'Cardio warm-up';
  content.appendChild(cardioLabel);
  content.appendChild(renderExerciseCard(state.day, day.warmup, true, false));
  content.appendChild(renderTrackedBlock(state.day, '__cardio_warmup__', 'Completed cardio warm-up'));

  const exLabel = document.createElement('div');
  exLabel.className = 'section-label';
  exLabel.textContent = 'Exercises';
  content.appendChild(exLabel);
  day.exercises.forEach(function(ex) {
    content.appendChild(renderExerciseCard(state.day, ex, false, false));
  });

  if (day.finisher) {
    const finLabel = document.createElement('div');
    finLabel.className = 'section-label';
    finLabel.textContent = 'Cooldown cardio';
    content.appendChild(finLabel);
    content.appendChild(renderExerciseCard(state.day, day.finisher, false, true));
    content.appendChild(renderTrackedBlock(state.day, '__finisher__', 'Completed cooldown cardio'));
  }
}

function renderCheckpointField(cpKey, fieldKey, label, placeholder) {
  const row = document.createElement('div');
  row.className = 'cp-row';
  const val = (state.checkpoints[cpKey] && state.checkpoints[cpKey][fieldKey]) || '';
  row.innerHTML = '<label>' + label + '</label><input type="text" inputmode="decimal" placeholder="' + placeholder + '" value="' + val + '" />';
  const input = row.querySelector('input');
  input.addEventListener('change', function() {
    if (!state.checkpoints[cpKey]) state.checkpoints[cpKey] = {};
    state.checkpoints[cpKey][fieldKey] = input.value;
    saveState();
  });
  return row;
}

function buildLineChart(title, points, color) {
  const wrap = document.createElement('div');
  wrap.className = 'progress-ex-card';
  if (title) {
    const h = document.createElement('h4');
    h.textContent = title;
    wrap.appendChild(h);
  }

  const valid = points.filter(function(p) { return p.val !== null && !isNaN(p.val); });
  if (valid.length < 2) {
    const nd = document.createElement('div');
    nd.className = 'no-data';
    nd.textContent = valid.length === 0 ? 'No data entered yet' : 'Need at least 2 data points to graph';
    wrap.appendChild(nd);
    return wrap;
  }

  const W = 320, H = 140, pad = 30;
  const vals = valid.map(function(p) { return p.val; });
  const min = Math.min.apply(null, vals), max = Math.max.apply(null, vals);
  const range = max - min || 1;
  const stepX = (W - pad * 2) / (points.length - 1);

  let pathD = '';
  let dots = '';
  let labels = '';
  points.forEach(function(p, i) {
    if (p.val === null || isNaN(p.val)) return;
    const x = pad + i * stepX;
    const y = H - pad - ((p.val - min) / range) * (H - pad * 2);
    pathD += (pathD ? 'L' : 'M') + x + ',' + y + ' ';
    dots += '<circle cx="' + x + '" cy="' + y + '" r="4" fill="' + color + '"/>';
    labels += '<text x="' + x + '" y="' + (H - 6) + '" font-size="10" fill="#999" text-anchor="middle">' + p.label + '</text>';
    labels += '<text x="' + x + '" y="' + (y - 10) + '" font-size="11" fill="#333" text-anchor="middle" font-weight="600">' + p.val + '</text>';
  });

  const svg = '<svg class="chart" viewBox="0 0 ' + W + ' ' + H + '"><path d="' + pathD + '" fill="none" stroke="' + color + '" stroke-width="2.5"/>' + dots + labels + '</svg>';
  wrap.innerHTML += svg;

  const first = valid[0].val, last = valid[valid.length - 1].val;
  const diff = (last - first).toFixed(1);
  const stats = document.createElement('div');
  stats.className = 'chart-stats';
  stats.innerHTML = '<div>Start: <strong>' + first + '</strong></div><div>Latest: <strong>' + last + '</strong></div><div>Change: <strong>' + (diff > 0 ? '+' : '') + diff + '</strong></div>';
  wrap.appendChild(stats);

  return wrap;
}

function renderCheckpoints() {
  const cc = document.getElementById('checkpoint-content');
  cc.innerHTML = '';

  const intro = document.createElement('div');
  intro.className = 'banner';
  intro.innerHTML = '<strong>Monthly checkpoints - Cycle ' + state.cycle + ':</strong> log your numbers at the start, week 4, and week 8 to see real progress. Take front, side, and back photos on your phone at each checkpoint and keep them in an album named for the date.';
  cc.appendChild(intro);

  const checkpointDefs = [
    { key: 'start', title: 'Start' },
    { key: 'week4', title: 'Week 4' },
    { key: 'week8', title: 'Week 8' }
  ];

  checkpointDefs.forEach(function(def) {
    const card = document.createElement('div');
    card.className = 'checkpoint-card';
    const h = document.createElement('h3');
    h.textContent = def.title;
    card.appendChild(h);
    card.appendChild(renderCheckpointField(def.key, 'weight', 'Weight', 'lbs'));
    card.appendChild(renderCheckpointField(def.key, 'waist', 'Waist', 'inches'));

    const photoRow = document.createElement('div');
    photoRow.style.cssText = 'font-size:12px;color:#999;margin-top:8px;padding-top:8px;border-top:1px solid #f0efe9;';
    photoRow.textContent = 'Photos: front, side, back (store in your phone photo album)';
    card.appendChild(photoRow);

    cc.appendChild(card);
  });

  const measLabel = document.createElement('div');
  measLabel.className = 'section-label';
  measLabel.textContent = 'Measurement trend (all cycles)';
  cc.appendChild(measLabel);

  let allPoints = [];
  (state.archivedCheckpoints || []).forEach(function(arch) {
    checkpointDefs.forEach(function(def) {
      allPoints.push({
        label: 'C' + arch.cycle + ' ' + def.title,
        weight: parseFloat(arch[def.key] && arch[def.key].weight) || null,
        waist: parseFloat(arch[def.key] && arch[def.key].waist) || null
      });
    });
  });
  checkpointDefs.forEach(function(def) {
    allPoints.push({
      label: (state.cycle > 1 ? ('C' + state.cycle + ' ') : '') + def.title,
      weight: parseFloat(state.checkpoints[def.key] && state.checkpoints[def.key].weight) || null,
      waist: parseFloat(state.checkpoints[def.key] && state.checkpoints[def.key].waist) || null
    });
  });

  cc.appendChild(buildLineChart('Weight (lbs)', allPoints.map(function(p) { return { label: p.label, val: p.weight }; }), '#e8722c'));
  cc.appendChild(buildLineChart('Waist (in)', allPoints.map(function(p) { return { label: p.label, val: p.waist }; }), '#3a7ae8'));
}

function renderProgress() {
  const pc = document.getElementById('progress-content');
  pc.innerHTML = '';

  const intro = document.createElement('div');
  intro.className = 'banner';
  intro.innerHTML = '<strong>Exercise progress - Cycle ' + state.cycle + ':</strong> every weighted exercise logged so far, tracked across weeks and past cycles so you can see real improvement.';
  pc.appendChild(intro);

  const restartWrap = document.createElement('div');
  restartWrap.className = 'card';
  restartWrap.innerHTML = '<p class="ex-name" style="margin-bottom:6px;">Finished this 8-week cycle?</p><p class="ex-scheme" style="margin-bottom:10px;">Starting a new cycle resets the week picker to Week 1 with clean inputs. All past weights, dates, and checkpoints stay saved and keep showing on these graphs.</p>';
  const restartBtn = document.createElement('button');
  restartBtn.textContent = 'Start Cycle ' + (state.cycle + 1);
  restartBtn.style.cssText = 'width:100%;padding:12px;background:#1c1c1a;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;';
  restartBtn.onclick = function() {
    if (confirm('Start Cycle ' + (state.cycle + 1) + '? Your Cycle ' + state.cycle + ' data will stay saved for progress tracking, and the week picker will reset to Week 1.')) {
      const hasData = state.checkpoints && (
        (state.checkpoints.start && state.checkpoints.start.weight) ||
        (state.checkpoints.week4 && state.checkpoints.week4.weight) ||
        (state.checkpoints.week8 && state.checkpoints.week8.weight)
      );
      if (hasData) {
        const archived = { cycle: state.cycle };
        archived.start = state.checkpoints.start;
        archived.week4 = state.checkpoints.week4;
        archived.week8 = state.checkpoints.week8;
        state.archivedCheckpoints.push(archived);
      }
      state.checkpoints = { start: {}, week4: {}, week8: {} };
      state.cycle += 1;
      state.week = 1;
      state.view = 'day';
      saveState();
      render();
    }
  };
  restartWrap.appendChild(restartBtn);
  pc.appendChild(restartWrap);

  const dayset = state.restricted ? restrictedDays : days;
  const seen = {};
  const keys = Object.keys(dayset);

  for (let k = 0; k < keys.length; k++) {
    const dayKey = keys[k];
    const day = dayset[dayKey];
    if (day.rest) continue;
    for (let x = 0; x < day.exercises.length; x++) {
      const ex = day.exercises[x];
      if (ex.noWeight) continue;
      const uniqueKey = dayKey + '::' + ex.name;
      if (seen[uniqueKey]) continue;
      seen[uniqueKey] = true;

      const entries = getAllEntries(dayKey, ex.name);
      const card = document.createElement('div');
      card.className = 'progress-ex-card';
      const h = document.createElement('h4');
      h.textContent = ex.name + ' - ' + day.label;
      card.appendChild(h);

      if (entries.length < 2) {
        const nd = document.createElement('div');
        nd.className = 'no-data';
        nd.textContent = entries.length === 0 ? 'No weights logged yet' : ('1 entry logged (Week ' + entries[0].week + ': ' + entries[0].weight + ' lbs) - need 2+ to graph');
        card.appendChild(nd);
        pc.appendChild(card);
        continue;
      }

      const points = entries.map(function(e) {
        return { label: (state.cycle > 1 ? ('C' + e.cycle + 'W' + e.week) : ('Wk' + e.week)), val: e.weight };
      });
      const chartCard = buildLineChart('', points, '#e8722c');
      card.innerHTML += chartCard.innerHTML;
      pc.appendChild(card);
    }
  }

  if (Object.keys(seen).length === 0) {
    const nd = document.createElement('div');
    nd.className = 'rest-note';
    nd.textContent = 'No weighted exercises in the current mode.';
    pc.appendChild(nd);
  }
}

function renderDebug() {
  const dc = document.getElementById('debug-content');
  dc.innerHTML = '';

  const intro = document.createElement('div');
  intro.className = 'banner';
  intro.innerHTML = '<strong>Storage check:</strong> this shows exactly what is saved on this phone right now.';
  dc.appendChild(intro);

  const oldRaw = localStorage.getItem('workout-state');
  const newRaw = localStorage.getItem('workout-state-v2');

  const oldCard = document.createElement('div');
  oldCard.className = 'progress-ex-card';
  const oldCount = oldRaw ? Object.keys(JSON.parse(oldRaw).weights || {}).length : 0;
  oldCard.innerHTML = '<h4>Old data (workout-state)</h4><p style="font-size:13px;">' + (oldRaw ? ('Found. Contains ' + oldCount + ' logged entries.') : 'Not found on this device.') + '</p>';
  dc.appendChild(oldCard);

  const newCard = document.createElement('div');
  newCard.className = 'progress-ex-card';
  const newCount = newRaw ? Object.keys(JSON.parse(newRaw).weights || {}).length : 0;
  newCard.innerHTML = '<h4>New data (workout-state-v2)</h4><p style="font-size:13px;">' + (newRaw ? ('Found. Contains ' + newCount + ' logged entries.') : 'Not found on this device.') + '</p>';
  dc.appendChild(newCard);

  if (oldRaw && oldCount > 0) {
    const migrateBtn = document.createElement('button');
    migrateBtn.textContent = 'Force import old data now';
    migrateBtn.style.cssText = 'width:100%;padding:12px;background:#e8722c;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;margin-top:10px;';
    migrateBtn.onclick = function() {
      const migratedWeights = Object.assign({}, state.weights, migrateOldData(oldRaw));
      state.weights = migratedWeights;
      saveState();
      toast('Import complete');
      render();
    };
    dc.appendChild(migrateBtn);
  }
}

function render() {
  renderWeekPicker();
  renderDayTabs();
  const dayContent = document.getElementById('content');
  const cpContent = document.getElementById('checkpoint-content');
  const progContent = document.getElementById('progress-content');
  const debugContent = document.getElementById('debug-content');
  dayContent.style.display = 'none';
  cpContent.style.display = 'none';
  progContent.style.display = 'none';
  debugContent.style.display = 'none';

  if (state.view === 'checkpoints') {
    cpContent.style.display = 'block';
    renderCheckpoints();
  } else if (state.view === 'progress') {
    progContent.style.display = 'block';
    renderProgress();
  } else if (state.view === 'debug') {
    debugContent.style.display = 'block';
    renderDebug();
  } else {
    dayContent.style.display = 'block';
    renderContent();
  }
}

loadState();
</script>
