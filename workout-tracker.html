function todayStr() { return new Date().toISOString().split('T')[0]; }

function getMondayOfWeek(startDateStr, weekNumber) {
  const startDate = new Date(startDateStr + 'T00:00:00');
  const dayOfWeek = startDate.getDay();
  const daysToSubtract = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
  const firstMonday = new Date(startDate);
  firstMonday.setDate(startDate.getDate() - daysToSubtract);
  const targetMonday = new Date(firstMonday);
  targetMonday.setDate(firstMonday.getDate() + (weekNumber - 1) * 7);
  return targetMonday.toISOString().split('T')[0];
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 1400);
}

async function saveState() {
  try {
    localStorage.setItem('workout-state-v3', JSON.stringify(state));
    toast('Saved');
  } catch (e) {
    toast('Save failed, try again');
  }
}

function migrateToPerDayKeys() {
  if (state.migratedToPerDay) return;
  if (!state.activePlan) return;
  const oldKeyPattern = /^([a-zA-Z0-9_]+)::c(\d+)::w(\d+)$/;
  const newWeights = {};
  let migratedCount = 0;
  Object.keys(state.weights).forEach(function(oldKey) {
    const alreadyNewFormat = oldKey.split('::').length === 4;
    if (alreadyNewFormat) { newWeights[oldKey] = state.weights[oldKey]; return; }
    const match = oldKey.match(oldKeyPattern);
    if (!match) { newWeights[oldKey] = state.weights[oldKey]; return; }
    const exId = match[1]; const cycle = match[2]; const week = match[3];
    let ownerDay = null;
    Object.keys(state.activePlan).forEach(function(dayKey) {
      const day = state.activePlan[dayKey];
      if (day.rest) return;
      if (day.exerciseIds && day.exerciseIds.indexOf(exId) !== -1) { if (!ownerDay) ownerDay = dayKey; }
    });
    if (ownerDay) {
      const newKey = ownerDay + '::' + exId + '::c' + cycle + '::w' + week;
      newWeights[newKey] = state.weights[oldKey];
      migratedCount++;
    } else { newWeights[oldKey] = state.weights[oldKey]; }
  });
  state.weights = newWeights;
  state.migratedToPerDay = true;
  saveState();
  if (migratedCount > 0) { toast('Data updated: ' + migratedCount + ' entries migrated'); }
}

async function loadState() {
  try {
    const raw = localStorage.getItem('workout-state-v3');
    if (raw) {
      state = Object.assign({}, state, JSON.parse(raw));
      migrateToPerDayKeys();
    }
  } catch (e) {}
  if (!state.disclaimerAccepted) { render(); return; }
  if (!state.proteinGoal && !state.proteinPromptShown) { render(); return; }
  if (!state.goal || !state.activePlan) { state.screen = 'select_goal'; }
  render();
}

function acceptDisclaimer() {
  state.disclaimerAccepted = true;
  state.disclaimerAcceptedDate = todayStr();
  saveState();
  render();
}

function chooseLength(len) {
  state.selectedLength = len;

function finalizeProgram(goalKey, subgoalKey) {
  if (!isProgramAvailable(state.selectedLength, goalKey, subgoalKey)) { toast('That combination is not ready yet'); return; }
  const program = getProgram(state.selectedLength, goalKey, subgoalKey);
  state.goal = goalKey;
  state.selectedSubgoal = subgoalKey;
  state.activePlan = JSON.parse(JSON.stringify(program.days));
  state.programLength = state.selectedLength;
  state.cycleStartDate = todayStr();
  state.screen = 'day';
  state.week = 1;
  saveState();
  render();
}

function getEntry(dayKey, exId, week, cycle) {
  const c = cycle !== undefined ? cycle : state.viewingCycle;
  const k = dayKey + '::' + exId + '::c' + c + '::w' + week;
  return state.weights[k] || null;
}
function setEntry(dayKey, exId, week, field, val) {
  const k = dayKey + '::' + exId + '::c' + state.viewingCycle + '::w' + week;
  if (!state.weights[k]) state.weights[k] = {};
  state.weights[k][field] = val;
  saveState();
}
function clearEntry(dayKey, exId, week) {
  const k = dayKey + '::' + exId + '::c' + state.viewingCycle + '::w' + week;
  delete state.weights[k];
  saveState();
}
function getPrevEntry(dayKey, exId, week) {
  for (let w = week - 1; w >= 1; w--) {
    const e = getEntry(dayKey, exId, w);
    if (e && (e.weight || e.done)) return { week: w, entry: e };
  }
  if (state.viewingCycle > 1) {
    for (let c = state.viewingCycle - 1; c >= 1; c--) {
      for (let w = 8; w >= 1; w--) {
        const e = getEntry(dayKey, exId, w, c);
        if (e && (e.weight || e.done)) return { week: w, entry: e, cycle: c };
      }
    }
  }
  return null;
}
function getLastKnownWeightAnyDay(exId, excludeDayKey, week, cycle) {
  const c = cycle !== undefined ? cycle : state.viewingCycle;
  let best = null;
  Object.keys(state.activePlan).forEach(function(dayKey) {
    const day = state.activePlan[dayKey];
    if (day.rest && exId !== '__steps__') return;
    if (exId !== '__steps__' && (!day.exerciseIds || day.exerciseIds.indexOf(exId) === -1)) return;
    for (let w = week; w >= 1; w--) {
      if (dayKey === excludeDayKey && w === week) continue;
      const e = getEntry(dayKey, exId, w, c);
      if (e && e.weight) {
        if (!best || w > best.week || (w === best.week && dayKey > best.dayKey)) { best = { week: w, entry: e, dayKey: dayKey }; }
      }
    }
  });
  return best;
}
function getAllEntriesForExercise(exId) {
  const results = [];
  Object.keys(state.activePlan).forEach(function(dayKey) {
    for (let c = 1; c <= state.cycle; c++) {
      for (let w = 1; w <= (state.programLength || 8); w++) {
        const e = getEntry(dayKey, exId, w, c);
        if (e && e.weight) results.push({ week: w, cycle: c, dayKey: dayKey, weight: parseFloat(e.weight), date: e.date });
      }
    }
  });
  return results;
}

function getProteinEntries(dayKey, cycle, week) {
  const c = cycle !== undefined ? cycle : state.viewingCycle;
  const w = week !== undefined ? week : state.week;
  const key = proteinDayKey(dayKey, c, w);
  return state.proteinEntries[key] || [];
}

function addProteinEntry(dayKey, name, grams) {
  const key = proteinDayKey(dayKey, state.viewingCycle, state.week);
  if (!state.proteinEntries[key]) state.proteinEntries[key] = [];
  state.proteinEntries[key].push({ name: name, grams: grams, time: todayStr() });
  saveState();

function removeProteinEntry(dayKey, index) {
  const key = proteinDayKey(dayKey, state.viewingCycle, state.week);
  if (state.proteinEntries[key]) {
    state.proteinEntries[key].splice(index, 1);
    saveState();
  }
}

function getDailyProteinTotal(dayKey, cycle, week) {
  const entries = getProteinEntries(dayKey, cycle, week);
  let total = 0;
  entries.forEach(function(e) { total += (parseFloat(e.grams) || 0); });
  return total;
}

function getAllProteinTotals() {
  const results = [];
  Object.keys(state.activePlan).forEach(function(dayKey) {
    for (let c = 1; c <= state.cycle; c++) {
      for (let w = 1; w <= (state.programLength || 8); w++) {
        const total = getDailyProteinTotal(dayKey, c, w);
        if (total > 0) results.push({ week: w, cycle: c, dayKey: dayKey, total: total });
      }
    }
  });
  return results;
}

function isDayComplete(dayKey, week) {
  const day = state.activePlan[dayKey];
  if (!day) return false;
  if (day.rest) {
    const e = getEntry(dayKey, '__rest_' + dayKey + '__', week);
    const restDone = !!(e && e.done);
    if (day.stepsGoal) {
      const stepsE = getEntry(dayKey, '__steps__', week);
      return restDone && !!(stepsE && stepsE.weight);
    }
    return restDone;
  }
  const mob = getEntry(dayKey, '__mobility_' + dayKey + '__', week);
  if (!mob || !mob.done) return false;
  const cardio = getEntry(dayKey, '__cardio_' + dayKey + '__', week);
  if (!cardio || !cardio.done) return false;
  for (let i = 0; i < day.exerciseIds.length; i++) {
    const exId = day.exerciseIds[i];
    const ex = exerciseLibrary[exId];
    const e = getEntry(dayKey, exId, week);
    if (ex.noWeight) { if (!e || !e.done) return false; }
    else { if (!e || !e.weight) return false; }
  }
  if (day.finisherId) {
    const fin = getEntry(dayKey, '__finisher_' + dayKey + '__', week);
    if (!fin || !fin.done) return false;
  }
  return true;
}

function isWeekComplete(week) {
  const keys = Object.keys(state.activePlan);
  for (let i = 0; i < keys.length; i++) { if (!isDayComplete(keys[i], week)) return false; }
  return true;
}

function checkAndCelebrate(dayKey, week) {
  const dayCelebrationKey = 'c' + state.cycle + '-w' + week + '-' + dayKey;
  if (isDayComplete(dayKey, week) && state.celebratedDays.indexOf(dayCelebrationKey) === -1) {
    state.celebratedDays.push(dayCelebrationKey);
    saveState();
    setTimeout(function() { showEncouragementModal('day'); }, 350);
    return;
  }
  const weekCelebrationKey = 'c' + state.cycle + '-w' + week;
  if (isWeekComplete(week) && state.celebratedWeeks.indexOf(weekCelebrationKey) === -1) {
    state.celebratedWeeks.push(weekCelebrationKey);
    const totalWeeksForAdvance = state.programLength || 8;
    if (week < totalWeeksForAdvance) { state.week = week + 1; }
    const shouldShowTip = !state.shownWeekTip;
    if (shouldShowTip) state.shownWeekTip = true;
    saveState();
    setTimeout(function() {
      showEncouragementModal('week');
      if (shouldShowTip) {
        setTimeout(function() { showTipModal('week'); }, 900);
      }
      render();
    }, 350);
    return;
  }
  const totalWeeks = state.programLength || 8;
  let allWeeksDone = true;
  for (let w = 1; w <= totalWeeks; w++) { if (!isWeekComplete(w)) { allWeeksDone = false; break; } }
  const cycleCelebrationKey = 'c' + state.cycle;
  if (allWeeksDone && state.celebratedCycles.indexOf(cycleCelebrationKey) === -1) {
    state.celebratedCycles.push(cycleCelebrationKey);
    saveState();
    setTimeout(function() { showEncouragementModal('cycle'); }, 350);
  }
}

  const totalWeeks = state.programLength || 8;

  return week === midpoint || week === totalWeeks;

function buildLineChart(title, points, color) {
  const wrap = document.createElement('div');
  wrap.className = 'progress-ex-card';
  if (title) { const h = document.createElement('h4'); h.textContent = title; wrap.appendChild(h); }
  const valid = points.filter(function(p) { return p.val !== null && !isNaN(p.val); });
  if (valid.length < 2) {
    const nd = document.createElement('div');
    nd.className = 'no-data';
    nd.textContent = valid.length === 0 ? 'No data entered yet' : 'Need at least 2 data points to graph';
    wrap.appendChild(nd);
    return wrap;
  }
  const W = 320, H = 140, pad = 30;
  const vals = valid.map(function(p) { return p.val; });
  const min = Math.min.apply(null, vals), max = Math.max.apply(null, vals);
  const range = max - min || 1;
  const stepX = (W - pad * 2) / (points.length - 1);
  let pathD = '', dots = '', labels = '';
  points.forEach(function(p, i) {
    if (p.val === null || isNaN(p.val)) return;
    const x = pad + i * stepX;
    const y = H - pad - ((p.val - min) / range) * (H - pad * 2);
    pathD += (pathD ? 'L' : 'M') + x + ',' + y + ' ';
    dots += '<circle cx="' + x + '" cy="' + y + '" r="4" fill="' + color + '"/>';
    labels += '<text x="' + x + '" y="' + (H - 6) + '" font-size="10" fill="#999" text-anchor="middle">' + p.label + '</text>';
    labels += '<text x="' + x + '" y="' + (y - 10) + '" font-size="11" fill="#333" text-anchor="middle" font-weight="600">' + p.val + '</text>';
  });
  wrap.innerHTML += '<svg class="chart" viewBox="0 0 ' + W + ' ' + H + '"><path d="' + pathD + '" fill="none" stroke="' + color + '" stroke-width="2.5"/>' + dots + labels + '</svg>';
  const first = valid[0].val, last = valid[valid.length - 1].val;
  const diff = (last - first).toFixed(1);
  const stats = document.createElement('div');
  stats.className = 'chart-stats';
  stats.innerHTML = '<div>Start: <strong>' + first + '</strong></div><div>Latest: <strong>' + last + '</strong></div><div>Change: <strong>' + (diff > 0 ? '+' : '') + diff + '</strong></div>';
  wrap.appendChild(stats);
  return wrap;
}

    keys.sort().forEach(function(k) {
      const v = state.weights[k];
      entriesHtml += '<div style="font-size:11px;padding:3px 0;border-top:1px solid #f0efe9;">' + k + ' &rarr; ' + JSON.stringify(v) + '</div>';
    });
  }
  entriesCard.innerHTML = entriesHtml;
  content.appendChild(entriesCard);
  const allKeysCard = document.createElement('div');
  allKeysCard.className = 'progress-ex-card';
  let html = '<h4>All localStorage keys on this site</h4>';
  if (localStorage.length === 0) { html += '<p style="font-size:13px;">No keys found at all.</p>'; }
  else {
    html += '<p style="font-size:13px;">Found ' + localStorage.length + ' key(s):</p>';
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      const v = localStorage.getItem(k);
      html += '<div style="font-size:12px;padding:4px 0;border-top:1px solid #f0efe9;"><strong>' + k + '</strong> (' + (v ? v.length : 0) + ' chars)</div>';
    }
  }
  allKeysCard.innerHTML = html;
  content.appendChild(allKeysCard);
  container.appendChild(content);
}

function renderDayTabs(container) {
  const dt = document.createElement('div');
  dt.className = 'day-tabs';
  dt.style.cssText = 'flex-wrap:nowrap;overflow-x:visible;';
  const daySelectWrap = document.createElement('div');
  daySelectWrap.style.cssText = 'flex:1;min-width:0;';
  const keys = Object.keys(state.activePlan);
  const daySelect = document.createElement('select');
  daySelect.style.cssText = 'width:100%;padding:10px 12px;border-radius:8px;border:1px solid #ddd;background:#f7f6f2;font-size:14px;font-weight:600;color:#1c1c1a;';
  keys.forEach(function(key) {
    const opt = document.createElement('option');
    opt.value = key;
    const check = isDayComplete(key, state.week) ? ' (Done)' : '';
    opt.textContent = state.activePlan[key].label + check;
    if (state.day === key && state.screen === 'day') opt.selected = true;
    daySelect.appendChild(opt);
  });
  daySelect.onchange = function() { state.day = daySelect.value; state.screen = 'day'; saveState(); render(); };
  daySelectWrap.appendChild(daySelect);
  dt.appendChild(daySelectWrap);
  const cb = document.createElement('button');
  cb.className = 'day-tab' + (state.screen === 'checkpoints' ? ' active' : '');
  cb.textContent = 'Checkpoints';
  cb.onclick = function() {
    state.screen = state.screen === 'checkpoints' ? 'day' : 'checkpoints';
    saveState();
    render();
  };
  dt.appendChild(cb);
  const pb = document.createElement('button');
  pb.className = 'day-tab' + (state.screen === 'progress' ? ' active' : '');
  pb.textContent = 'Progress';
  pb.onclick = function() {
    state.screen = state.screen === 'progress' ? 'day' : 'progress';
    saveState();
    render();
  };
  dt.appendChild(pb);
  const protb = document.createElement('button');
  protb.className = 'day-tab' + (state.screen === 'protein' ? ' active' : '');
  protb.textContent = 'Protein';
  protb.onclick = function() {
    state.screen = state.screen === 'protein' ? 'day' : 'protein';
    saveState();
    render();
  };
  dt.appendChild(protb);
  container.appendChild(dt);
}

function renderWeekPicker(container) {
  const header = document.createElement('div');
  header.className = 'header';
  const cycleOptions = [];
  for (let c = 1; c <= state.cycle; c++) cycleOptions.push(c);
  let cycleSelectHtml = '';
  if (cycleOptions.length > 1) {
    cycleSelectHtml = '<select id="cycle-select" style="margin-top:8px;padding:8px 10px;border-radius:8px;border:1px solid #444;background:#2a2a27;color:#d5d4cd;font-size:13px;width:100%;">' +
      cycleOptions.map(function(c) { return '<option value="' + c + '"' + (c === state.viewingCycle ? ' selected' : '') + '>Cycle ' + c + (c === state.cycle ? ' (current)' : '') + '</option>'; }).join('') +
      '</select>';
  }
  header.innerHTML = '<h1>' + goalTemplates[state.goal].label + '</h1><div class="sub" id="week-sub"></div>' + cycleSelectHtml + '<div id="week-select-wrap" style="margin-top:10px;"></div>';
  container.appendChild(header);
  if (cycleOptions.length > 1) {
    const sel = header.querySelector('#cycle-select');
    sel.onchange = function() { state.viewingCycle = parseInt(sel.value, 10); state.week = 1; saveState(); render(); };
  }
  const weekWrap = header.querySelector('#week-select-wrap');
  const totalWeeks = state.programLength || 8;
  const weekSelect = document.createElement('select');
  weekSelect.style.cssText = 'width:100%;padding:10px 12px;border-radius:8px;border:1px solid #444;background:#2a2a27;color:#d5d4cd;font-size:14px;font-weight:600;';
  for (let i = 1; i <= totalWeeks; i++) {
    const opt = document.createElement('option');
    opt.value = i;
    const check = isWeekComplete(i) ? ' (Done)' : '';
    opt.textContent = 'Week ' + i + check;
    if (state.week === i) opt.selected = true;
    weekSelect.appendChild(opt);
  }
  weekSelect.onchange = function() { state.week = parseInt(weekSelect.value, 10); saveState(); render(); };
  weekWrap.appendChild(weekSelect);
  const viewingLabel = state.viewingCycle !== state.cycle ? ' - viewing past cycle' : '';
  header.querySelector('#week-sub').textContent = 'Cycle ' + state.viewingCycle + ' - Week ' + state.week + ' of ' + totalWeeks + viewingLabel;
  if (state.viewingCycle !== state.cycle) {
    const backBtn = document.createElement('button');
    backBtn.textContent = 'Return to current cycle';
    backBtn.style.cssText = 'margin-top:8px;padding:8px 12px;background:#e8722c;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;';
    backBtn.onclick = function() { state.viewingCycle = state.cycle; state.week = 1; saveState(); render(); };
    header.appendChild(backBtn);
  }
}

function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';
  if (!state.disclaimerAccepted) { renderDisclaimer(); return; }
  if (!state.proteinGoal && !state.proteinPromptShown) { renderProteinGoalSetup(); return; }
  if (state.screen === 'select_goal') { renderGoalSelect(); return; }
  if (state.screen === 'select_subgoal') { renderSubgoalSelect(); return; }
  if (state.screen === 'select_length') { renderLengthSelect(); return; }
  renderDayTabs(app);
  renderWeekPicker(app);
  if (state.screen === 'checkpoints') { renderCheckpointsScreen(app); }
  else if (state.screen === 'progress') { renderProgressScreen(app); }
  else if (state.screen === 'protein') { renderProteinScreen(app); }
  else if (state.screen === 'debug') { renderDebugScreen(app); }
  else { renderDayContent(app); }
}

loadState();
</script>

</body>
</html>
